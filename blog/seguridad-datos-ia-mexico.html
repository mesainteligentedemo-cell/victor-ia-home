    {
      "@type": "Question",
      "name": "¿La LFPDPPP aplica si uso una herramienta de IA extranjera como ChatGPT o Gemini en mi empresa mexicana?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí. La LFPDPPP aplica al responsable del tratamiento de datos, que eres tú como empresa mexicana. Al ingresar datos personales de clientes, empleados o proveedores en cualquier plataforma de IA —sin importar el origen del proveedor— tú sigues siendo el responsable legal. Esto implica que debes tener un aviso de privacidad actualizado, obtener consentimiento cuando sea requerido, y asegurarte de que el proveedor de IA cumpla con estándares de seguridad equivalentes. El hecho de que el servidor esté en otro país no te exime de obligaciones ante el INAI."
      }
    },
    {
      "@type": "Question",
      "name": "¿Qué multas puede imponer el INAI por mal manejo de datos en sistemas de IA?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "El INAI puede imponer sanciones que van desde 100 hasta 320,000 días de salario mínimo general vigente en la Ciudad de México. En cifras de 2025, eso representa entre aproximadamente $10,000 MXN y $32 millones de pesos. Las sanciones más graves —uso de datos sin consentimiento, transferencia ilegal a terceros o falta de medidas de seguridad que deriven en una brecha— están en los rangos superiores. Además, el INAI puede ordenar la suspensión inmediata del tratamiento de datos, lo que en la práctica significa apagar tu sistema de IA hasta resolver el problema."
      }
    },
    {
      "@type": "Question",
      "name": "¿Mi empresa necesita cumplir con el GDPR europeo si solo opera en México?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Depende de tu modelo de negocio. El GDPR aplica si: (1) tienes clientes, usuarios o empleados que residan en la Unión Europea, (2) tu sitio web o app monitorea comportamiento de personas en la UE, o (3) ofreces bienes o servicios a personas en la UE, aunque sea de forma gratuita. Si tu operación es 100% México y no tienes ningún contacto con la UE, el GDPR no aplica directamente. Sin embargo, muchos proveedores de IA y herramientas SaaS exigen cumplimiento GDPR como condición contractual, así que indirectamente termina afectándote."
      }
    },
    {
      "@type": "Question",
      "name": "¿Puedo usar los datos de mis clientes para entrenar un modelo de IA propio?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Técnicamente sí, pero con condiciones estrictas. Primero, tu aviso de privacidad debe especificar explícitamente que los datos pueden usarse para 'desarrollo de modelos de inteligencia artificial o sistemas automatizados de toma de decisiones'. Si ese propósito no está en tu aviso actual, necesitas actualizarlo y en muchos casos obtener consentimiento adicional. Segundo, los datos de menores de edad tienen restricciones especiales bajo la LFPDPPP. Tercero, antes de entrenar un modelo, debes aplicar técnicas de anonimización o seudonimización para reducir el riesgo. Usar datos sin estas condiciones puede derivar en una violación al principio de finalidad de la ley."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cuál es la diferencia práctica entre anonimizar y seudonimizar datos para sistemas de IA?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Anonimizar significa eliminar permanentemente cualquier posibilidad de identificar a la persona: una vez anonimizado, el dato ya no es 'dato personal' bajo la ley y puedes usarlo con mayor libertad. La seudonimización reemplaza identificadores directos (nombre, CURP, RFC) con códigos o tokens, pero mantiene la posibilidad de re-identificar si tienes acceso a la tabla de referencia. Para IA, la seudonimización es más común porque preserva la utilidad estadística del dato. Sin embargo, los datos seudonimizados siguen siendo datos personales bajo la LFPDPPP y el GDPR, así que las obligaciones de seguridad continúan aplicando. La anonimización real —que elimina incluso la posibilidad técnica de re-identificación— es difícil de lograr en datasets grandes y complejos."
      }
    }
  ]
