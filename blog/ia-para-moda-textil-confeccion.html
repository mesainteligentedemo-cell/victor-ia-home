      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Para una PyME textil con ventas anuales de entre 20 y 80 millones de pesos, la implementación inicial de herramientas de IA —pronóstico de demanda, automatización de atención al cliente y análisis de inventario— ronda entre 8,000 y 25,000 pesos mensuales en plataformas SaaS ya entrenadas. Soluciones a medida con integración a ERP propio pueden iniciar desde 150,000 pesos en proyecto más mantenimiento mensual. El ROI promedio documentado en empresas comparables es de 6 a 9 meses."
      }
    },
    {
      "@type": "Question",
      "name": "¿La IA puede ayudar a reducir la merma de tela en la producción?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí, y es uno de los casos de uso con retorno más rápido. Los sistemas de optimización de patronaje basados en IA analizan órdenes de producción, dimensiones de tela y patrones de corte para minimizar desperdicio. Empresas que han adoptado estas soluciones reportan reducciones de merma de entre 12% y 22%. En una planta que consume 50,000 metros de tela al mes a 80 pesos el metro, una reducción del 15% equivale a ahorros de 600,000 pesos mensuales."
      }
    },
    {
      "@type": "Question",
      "name": "¿Qué datos necesita tener ordenados una empresa de moda antes de implementar IA?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "El mínimo viable son tres fuentes de datos: historial de ventas por SKU con al menos 18 meses hacia atrás, registro de inventario con entradas y salidas (no solo saldo), y datos de devoluciones con motivo de devolución. Con eso, un modelo de pronóstico de demanda ya puede entrenarse. No se requiere un data lake ni un equipo de data science interno; las plataformas modernas procesan archivos Excel o se conectan directamente a sistemas como Aspel, CONTPAQi o SAP Business One."
      }
    },
    {
      "@type": "Question",
      "name": "¿Funciona la IA generativa para diseño de moda en marcas pequeñas?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Funciona como herramienta de exploración rápida, no como sustituto del diseñador. Una marca mediana puede usar herramientas como Midjourney, Adobe Firefly o Stable Diffusion para generar 50 propuestas de estampados o siluetas en una tarde, reducir el ciclo de conceptualización de 3 semanas a 3 días y presentar opciones visuales a compradores o clientes antes de fabricar una sola muestra. El resultado final sigue requiriendo la edición y criterio de un diseñador, pero el tiempo de iteración se reduce hasta 70%."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cómo afecta la IA al personal de una fábrica textil o tienda de moda?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "En producción, la IA automatiza tareas repetitivas de control de calidad visual y programación de corte, lo que libera al personal para supervisión y ensamble de mayor complejidad. En ventas, los chatbots atienden entre el 60% y el 80% de consultas rutinarias, pero los asesores humanos se concentran en cierres de venta y clientes frecuentes de alto valor. Las empresas que han documentado el proceso reportan que no han reducido plantilla; han reasignado funciones y en varios casos han crecido ventas sin contratar más personal de atención."
      }
