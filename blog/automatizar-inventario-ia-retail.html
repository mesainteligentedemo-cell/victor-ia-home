      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Una implementación básica con herramientas como Victor IA parte desde $4,500 MXN al mes para empresas con hasta 5 puntos de venta y menos de 3,000 SKUs activos. Las soluciones empresariales con integración a ERP y múltiples bodegas oscilan entre $18,000 y $45,000 MXN mensuales. En el sector retail, los proyectos de reducción de merma y quiebres de stock suelen recuperar la inversión en pocos meses."
      }

    {
      "@type": "Question",
      "name": "¿Qué datos necesito para que la IA prediga la demanda correctamente?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "El mínimo viable son 12 meses de historial de ventas por SKU, con fecha y hora de cada transacción. Idealmente también incluyes: precios de venta históricos, datos de promociones activas, registros de quiebres de stock (cuándo no tenías producto), y si vendes online, datos de tráfico web. Con ese set básico, los modelos de predicción alcanzan entre 78% y 87% de precisión en demanda semanal. Con datos adicionales como clima, eventos locales y temporadas específicas de tu región, la precisión puede superar el 91%."
      }
    },
    {
      "@type": "Question",
      "name": "¿La IA puede conectarse con mi sistema de punto de venta actual?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí, la mayoría de las plataformas modernas se integran mediante API o extracción de archivos con los sistemas más usados en México: Aspel SAE, CONTPAQi Punto de Venta, Bind ERP, Microsip, y las versiones locales de SAP Business One. Si tu sistema no tiene API nativa, se puede configurar una extracción automática de reportes en CSV que el modelo procesa diariamente. La integración toma entre 3 y 10 días hábiles dependiendo del sistema."
      }
    },
    {
      "@type": "Question",
      "name": "¿Qué diferencia hay entre reorden automático y reorden asistido por IA?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "El reorden automático tradicional usa reglas fijas: cuando el stock baja de X unidades, genera una orden por Y unidades. Simple, pero ignora estacionalidad, tendencias y variaciones de demanda. El reorden asistido por IA calcula dinámicamente el punto de reorden y la cantidad óptima considerando: velocidad de venta actual vs. histórico, tiempo de entrega del proveedor, probabilidad de demanda extra por eventos o temporada, y costo de almacenamiento vs. costo de quiebre. El resultado: 23% menos capital inmovilizado en inventario sin aumentar los quiebres de stock."
      }

      "acceptedAnswer": {
        "@type": "Answer",
