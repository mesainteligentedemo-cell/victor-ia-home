      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí. Cualquier empresa privada con operaciones en México que procese datos personales con sistemas de IA está sujeta a la LFPDPPP, sin importar el tamaño. Las microempresas tienen las mismas obligaciones de aviso de privacidad, consentimiento y seguridad que las corporaciones. La diferencia está en los recursos disponibles para implementar controles, no en la exigencia legal."

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Eres el responsable del tratamiento de datos ante el INAI y ante tus clientes. El proveedor extranjero es un 'encargado'. Debes tener un contrato de encargo que obligue al proveedor a respetar la LFPDPPP, verificar que cuente con certificaciones de seguridad adecuadas (SOC 2, ISO 27001) y documentar las transferencias internacionales en tu aviso de privacidad. Si el proveedor comete una violación, la responsabilidad primaria ante el regulador mexicano recae en tu empresa."
      }

      "name": "¿Cuánto puede multarme el INAI si no cumplo?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Las sanciones van de 100 a 320,000 días de salario mínimo general del Distrito Federal según el artículo 64 de la LFPDPPP. En 2026 eso equivale aproximadamente a MXN $10,900 hasta MXN $34.8 millones por infracción. Las multas más altas aplican cuando hay vulneraciones de seguridad no reportadas, tratamiento de datos sensibles sin consentimiento, o cuando se omite responder solicitudes ARCO."

      }
    },
    {
      "@type": "Question",
      "name": "¿Cómo sé si mi sistema de IA está tomando 'decisiones automatizadas' que exigen consentimiento especial?",
