      "acceptedAnswer": {

        "text": "Una implementación básica con agente de IA para agendamiento y seguimiento de órdenes de trabajo tarda entre 2 y 4 semanas. Esto incluye la integración con WhatsApp Business, la configuración de flujos de cotización automática y la capacitación del equipo. En el sector de servicios técnicos, los talleres que digitalizan su agendamiento suelen tener el sistema operativo en pocas semanas con su base de clientes existente."
      }
    },
    {
      "@type": "Question",
      "name": "¿Un agente de IA puede manejar cotizaciones técnicas complejas con precios variables?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí, con la configuración adecuada. El agente trabaja con una base de conocimiento que incluye catálogo de servicios, precios base, variaciones por zona geográfica y reglas de descuento. Para servicios muy especializados donde el diagnóstico in situ es necesario, el agente entrega una cotización de rango (mínimo-máximo) y agenda la visita de diagnóstico. El técnico puede ajustar la cotización final desde su app móvil antes de enviarla al cliente."
      }

      "name": "¿Qué pasa con los clientes que prefieren llamar por teléfono en lugar de WhatsApp?",

        "@type": "Answer",
        "text": "El agente de IA opera en múltiples canales simultáneamente: WhatsApp, web chat y también puede integrarse con sistemas de voz sobre IP para atender llamadas entrantes con procesamiento de lenguaje natural en español mexicano. En el sector de climatización, la mayoría de los clientes suele preferir WhatsApp, una parte usa el chat web y solo una minoría llama directamente, lo que reduce significativamente el tiempo de atención telefónica manual."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cómo se asegura la empresa de que el técnico correcto va a la orden correcta?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "El sistema de asignación inteligente considera tres variables en tiempo real: la especialización del técnico (eléctrico, mecánico, refrigeración, etc.), su ubicación GPS actual y su carga de trabajo del día. El agente de IA asigna automáticamente la orden al técnico más adecuado y geográficamente más cercano, recalculando rutas si hay cancelaciones o emergencias. En el sector de mantenimiento industrial, la asignación automática suele reducir de forma notable el tiempo de despacho frente a la coordinación manual."
