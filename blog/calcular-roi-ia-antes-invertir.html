        "text": "Depende del proceso automatizado y la escala de la empresa. Para PyMEs medianas en México, el periodo promedio de recuperación (payback period) oscila entre 4 y 14 meses. Los proyectos de atención a clientes con chatbots suelen recuperarse en 3 a 5 meses. Los proyectos de automatización de back-office como facturación o reportes tardan entre 6 y 10 meses. Los proyectos más complejos de predicción de demanda o mantenimiento predictivo pueden tomar hasta 12 a 18 meses, pero generan ahorros más grandes a largo plazo."

      "@type": "Question",
      "name": "¿Qué costos ocultos debo incluir al calcular el ROI de la IA?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Los costos ocultos más frecuentes que las empresas mexicanas omiten son: (1) Capacitación del equipo, que puede representar entre 15% y 25% del costo total del proyecto. (2) Limpieza y preparación de datos históricos, especialmente si llevan años en Excel o sistemas desactualizados. (3) Integración con sistemas legados como ERP o CRM existentes. (4) Mantenimiento mensual de los modelos de IA, generalmente entre 8% y 15% del costo inicial por año. (5) Tiempo de los empleados durante la fase de implementación y ajuste. No incluirlos infla artificialmente el ROI esperado y genera decepciones."
      }

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Los proyectos de IA bien ejecutados en empresas medianas mexicanas generan ROI entre 120% y 340% en el primer año, según datos de implementaciones en los sectores comercial, logístico y de servicios. Proyectos de automatización de procesos repetitivos (RPA+IA) promedian 180% de ROI al primer año. Proyectos de análisis predictivo de ventas promedian 220%. Sin embargo, proyectos mal definidos o con datos de baja calidad pueden generar ROI negativo. La diferencia está en la calidad de la definición del problema, no en la tecnología."
