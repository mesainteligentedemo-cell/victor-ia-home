      "acceptedAnswer": {
        "@type": "Answer",
        "text": "El rango varía según el proveedor y la complejidad. Una solución básica de chatbot para atención ciudadana en un municipio de entre 50,000 y 200,000 habitantes puede costar entre $180,000 y $450,000 MXN de implementación inicial, más un mantenimiento mensual de $12,000 a $35,000 MXN. Los municipios que licitan estas soluciones suelen ubicar el retorno de inversión en un rango de poco más de un año por reducción de personal en ventanilla y disminución de horas extras."

      "name": "¿Qué trámites municipales se pueden automatizar con IA sin cambiar la ley?",

        "@type": "Answer",
        "text": "Sin modificaciones legales, los municipios pueden automatizar: consulta de estado de trámites, pago de predial y agua en línea con asistente virtual, citas para servicios de registro civil, orientación sobre requisitos de licencias de construcción, recepción de reportes ciudadanos (baches, alumbrado), y seguimiento de quejas. Estos flujos no requieren firma electrónica avanzada ni reforma al reglamento municipal porque son servicios de información y pre-gestión, no actos administrativos definitivos."
      }
    },
    {
      "@type": "Question",
      "name": "¿Qué dice el marco legal mexicano sobre uso de IA en gobierno?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "México no tiene una ley específica de IA para gobierno al cierre de 2025, pero la Estrategia Digital Nacional 2021-2024 establece principios de gobierno digital que habilitan el uso de automatización. A nivel federal, la Secretaría de la Función Pública emitió lineamientos de ciberseguridad que aplican a toda solución tecnológica pública. Los municipios deben además observar la Ley General de Protección de Datos Personales en Posesión de Sujetos Obligados (LGPDPPSO) para cualquier sistema que procese información ciudadana."
      }
    },

      "@type": "Question",
      "name": "¿Qué tipo de soluciones de IA aplican los municipios mexicanos?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Existen distintos patrones de aplicación por área de servicio. En atención ciudadana, los municipios despliegan asistentes virtuales en sus portales para orientar en decenas de trámites, lo que reduce la carga de los call centers y extiende el horario de atención. En movilidad, el análisis predictivo permite optimizar ciclos semafóricos en intersecciones congestionadas. En infraestructura, la visión por computadora ayuda a detectar daños en pavimento. Y en obras, la revisión asistida de planos para licencias menores acorta los tiempos de dictamen. Lo común a estos casos es empezar por un proceso específico de alto volumen."

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí, mediante dos rutas principales: licitación pública (para contratos mayores a 300,000 MXN según la Ley de Adquisiciones) o adjudicación directa para servicios menores. Muchos municipios de entre 30,000 y 150,000 habitantes contratan directamente soluciones de chatbot y automatización de trámites por montos que no requieren licitación. Victor IA trabaja tanto en esquema SaaS mensual —lo que facilita la contratación directa— como en proyectos de implementación puntual. La clave es que el municipio defina primero qué proceso quiere mejorar, no que compre tecnología genérica."
