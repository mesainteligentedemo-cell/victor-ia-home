      "name": "¿Cuánto tiempo tarda en implementarse un agente IA de onboarding para una PyME mexicana?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Con una plataforma como Victor IA, una PyME con flujo de onboarding definido puede tener el agente operativo en 5 a 10 días hábiles. El proceso incluye mapeo del flujo actual, configuración de los pasos automatizados, integración con CRM o sistema de gestión existente, y pruebas con clientes reales. Empresas sin flujo documentado pueden tardar 15 a 20 días por el tiempo que toma definir el proceso internamente."
      }
    },
    {
      "@type": "Question",
      "name": "¿El agente IA puede verificar identidad y documentos de nuevos clientes en México?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí. Los agentes IA modernos se integran con servicios de verificación de identidad como Metamap, Truora o Mati, que están certificados para operar en México y cumplen con la LFPDPPP. El agente solicita INE o pasaporte, CURP, comprobante de domicilio y otros documentos según el giro, los envía al servicio de verificación y recibe respuesta en minutos. Para empresas del sector financiero regulado por CNBV, la integración incluye verificación de listas negras del SAT y CONDUSEF."
      }
    },
    {
      "@type": "Question",
      "name": "¿Qué pasa si el cliente tiene dudas que el agente no puede resolver durante el onboarding?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "El agente detecta automáticamente cuando una pregunta supera su alcance configurado y activa un protocolo de escalamiento. Dependiendo del horario y la disponibilidad del equipo, puede: (1) transferir la conversación en tiempo real a un asesor humano vía WhatsApp o chat, (2) registrar la duda y programar una llamada de seguimiento en el horario que el cliente elija, o (3) responder desde una base de conocimiento más amplia si la pregunta está catalogada. En promedio, menos del 12% de los onboardings requieren intervención humana."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cuánto cuesta implementar onboarding automático con IA vs contratar personal?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Un ejecutivo de bienvenida en México tiene un costo total para la empresa de entre $18,000 y $28,000 MXN mensuales considerando sueldo, IMSS, Infonavit y prestaciones. Ese ejecutivo puede gestionar entre 40 y 80 onboardings por mes de manera efectiva. Un agente IA en Victor IA maneja hasta 500 onboardings mensuales a un costo de $4,500 a $9,000 MXN según el plan, con disponibilidad 24/7 y tiempo de respuesta menor a 2 minutos. El ROI se recupera en el primer mes para empresas con más de 30 clientes nuevos al mes."
      }
    },
    {
      "@type": "Question",
      "name": "¿El onboarding automático funciona para clientes empresariales (B2B) o solo para consumidor final (B2C)?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Funciona para ambos, aunque el flujo es diferente. En B2C el proceso es más lineal: bienvenida, verificación de datos, activación de cuenta y guía de primeros pasos. En B2B el agente maneja flujos más complejos: recopila datos fiscales (RFC, acta constitutiva, poder notarial), coordina la firma electrónica del contrato, gestiona la aprobación de crédito o línea comercial y programa la sesión de onboarding técnico con el equipo. Empresas como distribuidoras, SaaS B2B y servicios profesionales en México usan este esquema para reducir su ciclo de cierre de 15 días a 3 días."
