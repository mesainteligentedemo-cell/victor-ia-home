      }
    },

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí. Los agentes de IA modernos se conectan vía API REST con los principales sistemas de expediente clínico electrónico usados en México, incluyendo MedSyn, DoctoLink, OpenMRS y sistemas propietarios. La integración típica toma entre 2 y 4 semanas dependiendo de la complejidad del sistema existente. En casos donde el sistema no tiene API abierta, se pueden usar conectores de scraping estructurado o exportaciones programadas en CSV/HL7."
      }

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "La LFPDPPP obliga a cualquier sistema que procese datos de salud a contar con aviso de privacidad, medidas de seguridad técnicas y administrativas, y consentimiento explícito del titular. Los agentes de IA responsables operan con cifrado AES-256 en tránsito y en reposo, logs de auditoría, servidores dentro de territorio nacional o bajo acuerdos de transferencia internacional reconocidos por el INAI, y nunca comparten datos con terceros sin consentimiento. Victor IA entrega documentación técnica lista para auditoría del INAI."
