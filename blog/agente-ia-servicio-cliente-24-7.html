      "acceptedAnswer": {

      }
    },

      "@type": "Question",
      "name": "¿Un agente de IA puede reemplazar completamente a mi equipo de soporte?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No completamente, ni debería. El modelo más efectivo es híbrido: el agente de IA resuelve entre el 65% y el 80% de las consultas de forma autónoma —rastreo de pedidos, preguntas frecuentes, cambios de cita, consultas de saldo—, y escala al equipo humano los casos que requieren criterio, empatía o autorización especial. Las empresas que intentan automatizar el 100% reportan caídas en su NPS de entre 12 y 18 puntos. El objetivo es liberar a tu equipo humano para los momentos que realmente importan."
      }
    },

      "@type": "Question",
      "name": "¿Cuánto tiempo tarda implementar un agente de IA funcional?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Depende del alcance. Un agente básico con flujos predefinidos para WhatsApp se puede desplegar en 5 a 10 días hábiles. Una implementación con integración a tu ERP, CRM y base de conocimiento propia requiere entre 3 y 6 semanas. El cuello de botella casi nunca es la tecnología: es la etapa de mapeo de flujos y validación del tono de marca, que tarda entre 1 y 2 semanas. Con Victor IA, las PyMEs medianas están operativas en promedio en 18 días calendario."
      }
    },

      "name": "¿Qué canales puede atender un agente de IA simultáneamente?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Un agente bien configurado puede operar en paralelo en WhatsApp Business API, chat del sitio web, Messenger de Facebook, Instagram DM, correo electrónico y hasta por voz a través de integraciones con Twilio o plataformas similares. En México, WhatsApp concentra el 78% del volumen de consultas en empresas de consumo masivo, por lo que es el canal prioritario. Lo relevante no es cuántos canales abres, sino que el agente tenga el mismo contexto del cliente sin importar por dónde llegue."
