        "@type": "Answer",
        "text": "Depende del alcance. Un sistema de conteo de tráfico con cámaras de visión computacional puede costar entre 18,000 y 45,000 pesos MXN en hardware más una suscripción mensual de 2,500 a 6,000 pesos. Un agente de IA para inventario predictivo en una tienda mediana (hasta 3 sucursales) ronda los 8,000 a 15,000 pesos al mes con plataformas como Victor IA. La recuperación de inversión promedio documentada en PyMEs mexicanas es de 4 a 7 meses."

      "@type": "Question",
      "name": "¿Qué datos necesita la IA para funcionar en retail?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Los sistemas de IA para tiendas físicas trabajan con tres fuentes principales: datos del punto de venta (transacciones, SKUs, horarios), datos de tráfico (conteo de personas, zonas calientes, tiempo de permanencia) y datos de inventario (entradas, salidas, merma, devoluciones). Con 90 días de historial de ventas ya se pueden generar predicciones útiles. No necesitas un ERP sofisticado; muchos sistemas se integran directo con tu lector de código de barras o tu sistema de POS existente."
      }

      "@type": "Question",
      "name": "¿La IA reemplaza a los vendedores de piso?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. Las tiendas que implementan IA para análisis de tráfico y comportamiento de compra suelen redirigir a su personal hacia actividades de mayor valor: asistencia personalizada, gestión de devoluciones y atención a clientes de ticket alto. Por ejemplo, una ferretería puede reducir el tiempo administrativo dedicado al inventario y canalizar esas horas a la capacitación de vendedores, lo que tiende a reflejarse en más ventas de productos complementarios (cross-selling)."
      }
    },

      "@type": "Question",
      "name": "¿Qué tipo de tienda se beneficia más con IA en México?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Las categorías con mayor retorno documentado son: ferreterías y materiales de construcción (alta variabilidad de inventario), tiendas de ropa y calzado (gestión de tallas y temporadas), papelerías y artículos de oficina (patrones de demanda predecibles), farmacias independientes (caducidades y reposición crítica) y misceláneas con entre 500 y 2,000 SKUs. En general, cualquier tienda con más de 300 productos distintos y al menos dos años de operación tiene suficiente historial para que la IA genere valor desde el primer mes."
