      "name": "¿Qué tan costoso es implementar IA en un marketplace mexicano mediano?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "El costo varía según el alcance. Un módulo de recomendaciones básico basado en filtrado colaborativo puede implementarse desde $18,000 MXN mensuales usando plataformas como AWS Personalize o soluciones como Victor IA. Un sistema completo de detección de fraude más personalización más matching puede oscilar entre $45,000 y $120,000 MXN mensuales para un marketplace con 50,000 a 300,000 SKUs activos. El ROI promedio se recupera en 4 a 7 meses según datos de implementaciones en México durante 2024-2025."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cuánto reduce la IA el fraude en plataformas de pago en México?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Los sistemas de detección de fraude basados en machine learning reducen las pérdidas por transacciones fraudulentas entre 67% y 84% comparado con reglas estáticas tradicionales. En México, donde el fraude en e-commerce representó pérdidas estimadas de $13,200 millones de pesos en 2024 según la AMVO, plataformas que implementaron IA reportan tasas de falsos positivos menores al 0.8%, lo que también reduce el rechazo de compras legítimas y mejora la experiencia de usuario."
      }
    },
    {
      "@type": "Question",
      "name": "¿Funciona la IA para marketplaces pequeños con menos de 10,000 productos?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí, aunque el enfoque cambia. Con catálogos menores a 10,000 SKUs, el filtrado colaborativo necesita datos de comportamiento suficientes (mínimo 6 meses de historial transaccional). La alternativa más efectiva para marketplaces pequeños es el filtrado basado en contenido: la IA analiza atributos del producto (precio, categoría, características) para hacer recomendaciones sin necesitar grandes volúmenes de datos históricos. Marketplaces B2B mexicanos con 3,000 a 8,000 productos han reportado aumentos de ticket promedio de 19% a 28% con este enfoque."
      }
    },
    {
      "@type": "Question",
      "name": "¿Qué datos necesito tener ordenados antes de implementar IA en mi plataforma?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Los tres bloques mínimos son: (1) Datos de producto limpios con atributos consistentes, sin duplicados y con categorización coherente. (2) Historial de transacciones con al menos 90 días de datos que incluyan timestamp, usuario, producto, precio pagado y resultado (completada, devuelta, cancelada). (3) Datos de comportamiento en sesión: clicks, tiempo en página, búsquedas y scroll depth. Sin estos tres bloques, cualquier modelo de IA producirá recomendaciones de baja calidad. La limpieza de datos suele tomar de 3 a 6 semanas en plataformas medianas mexicanas."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cómo mido si el sistema de IA está generando resultados reales en mi marketplace?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Las métricas clave son cuatro: CTR de recomendaciones (porcentaje de veces que el usuario hace clic en un producto recomendado, benchmark México: 4.2% a 7.8%), tasa de conversión asistida por IA (qué porcentaje de ventas totales pasaron por al menos una recomendación del sistema), incremento en AOV (Average Order Value) en sesiones con recomendaciones versus sin ellas, y reducción de tasa de abandono de carrito. Se recomienda hacer pruebas A/B formales durante al menos 30 días antes de evaluar el impacto real, dado que los algoritmos de recomendación mejoran con el tiempo conforme acumulan datos de comportamiento."
