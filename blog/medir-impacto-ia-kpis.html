      }

      "@type": "Question",
      "name": "¿Cuál es el KPI más importante para medir el ROI de la IA en una empresa mediana?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "El Costo por Transacción Automatizada (CPTA) es el más directo porque convierte el impacto operativo en pesos. Sin embargo, combinarlo con el Tiempo de Resolución de Procesos te da una imagen completa: sabes cuánto cuesta cada operación y qué tan rápido se ejecuta. Solo con ambos puedes calcular el ROI real, no estimado."
      }

    {
      "@type": "Question",
      "name": "¿Qué pasa si mis KPIs de IA no mejoran después de 3 meses?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Hay tres causas típicas: el proceso elegido para automatizar no era el cuello de botella real, los datos con los que opera el modelo son insuficientes o de mala calidad, o el equipo no adoptó la herramienta correctamente. Antes de concluir que la IA no funciona, audita estas tres variables. En la mayoría de los casos el problema es de adopción, no de tecnología."
      }

      "@type": "Question",
      "name": "¿Cómo establezco la línea base correcta para mis KPIs de IA?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Mide el estado actual del proceso durante al menos 4 semanas consecutivas antes de activar la herramienta de IA. Registra: tiempo promedio por tarea, costo total (incluyendo horas-hombre), tasa de error y satisfacción del cliente si aplica. Esos números son tu punto cero. Sin línea base, cualquier mejora que reportes será cuestionable."
      }
