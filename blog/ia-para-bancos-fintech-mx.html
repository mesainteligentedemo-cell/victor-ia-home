        "@type": "Answer",

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "La diferencia más medible está en cobertura y precisión simultáneas. Los modelos de scoring tradicionales basados en buró de crédito dejan fuera a una parte importante de la población mexicana que no tiene historial crediticio formal. Los modelos de IA que incorporan datos alternativos (comportamiento en app, patrones de pago de servicios, geolocalización) pueden evaluar a este segmento con tasas de default similares o menores a las del segmento bancarizado tradicional. Las fintechs que adoptan este tipo de modelos suelen aprobar solicitudes que un modelo tradicional rechazaría, manteniendo su tasa de morosidad bajo control."
      }

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Los modelos de detección de fraude en SPEI operan en tiempo real, analizando cada transacción en milisegundos antes de autorizar el envío. Evalúan variables como: historial de transferencias del usuario, hora y dispositivo desde donde se origina, monto relativo al comportamiento habitual, beneficiario nuevo versus conocido, y patrones de ingreso a la aplicación previos a la transacción. Cuando el score de riesgo supera cierto umbral, el sistema puede bloquear la transacción, solicitar segundo factor de autenticación o alertar al equipo de fraude. Los mejores modelos en producción en México logran detectar entre el 91% y el 96% de transacciones fraudulentas con una tasa de falsos positivos menor al 0.3%."
