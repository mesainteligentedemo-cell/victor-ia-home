      "name": "¿Cuánto cuesta implementar IA en un programa de MBA o educación ejecutiva en México?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Los costos varían según el alcance. Una implementación básica con chatbots de captación y seguimiento automatizado ronda los $18,000–$45,000 MXN mensuales para programas de entre 200 y 800 participantes activos. Las soluciones más completas, que incluyen personalización de contenidos y analítica predictiva de deserción, pueden llegar a $90,000–$180,000 MXN mensuales. El retorno típico se recupera en 4 a 8 meses si se reduce la deserción en al menos 12 puntos porcentuales."
      }
    },
    {
      "@type": "Question",
      "name": "¿La IA puede reemplazar a los profesores o facilitadores en programas ejecutivos?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No, y ese no es el objetivo. La IA en educación ejecutiva opera en las capas de administración, seguimiento, personalización de rutas de aprendizaje y captación de prospectos. El facilitador sigue siendo el centro del valor percibido por el ejecutivo. Lo que cambia es que el profesor dedica menos tiempo a tareas operativas (recordatorios, evaluaciones básicas, reportes de avance) y más tiempo a sesiones de alto valor como coaching, análisis de casos y mentoría individual."
      }
    },
    {
      "@type": "Question",
      "name": "¿Qué métricas mejoran más rápido con IA en programas ejecutivos?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Las métricas de respuesta más rápida son: tasa de respuesta a prospectos (de 18 horas promedio a menos de 3 minutos), tasa de conversión de lead a inscripción (mejoras del 22% al 38% en los primeros 90 días), y tasa de completación de módulos en línea (aumentos del 18–27% con recordatorios personalizados). La reducción de deserción total es la métrica más importante pero tarda 6–9 meses en consolidarse porque requiere datos de cohortes completas."
      }
    },
    {
      "@type": "Question",
      "name": "¿Qué tan difícil es integrar IA con plataformas LMS como Canvas, Moodle o Blackboard?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Canvas y Moodle tienen APIs abiertas que facilitan la integración en 3–6 semanas para funciones básicas. Blackboard requiere trabajo adicional según la versión instalada. El mayor reto no es técnico: es mapear los datos existentes del alumno y definir qué comportamientos activan qué intervenciones. Escuelas que no tienen datos históricos limpios de sus alumnos tardan más en ver resultados porque los modelos predictivos necesitan al menos 2–3 cohortes de datos para calibrarse correctamente."
      }
    },
    {
      "@type": "Question",
      "name": "¿Funciona la IA para programas ejecutivos presenciales, no solo en línea?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí, y hay aplicaciones específicas para formato presencial: check-in automatizado por reconocimiento de asistencia, seguimiento post-sesión por WhatsApp con resúmenes y tareas, análisis de participación en foros de discusión entre sesiones, y gestión de proyectos de aplicación en las empresas de los participantes. Los programas híbridos —que representan el 61% de la oferta ejecutiva en México según datos de 2025— son donde la IA genera más valor porque deben coordinar dos experiencias distintas simultáneamente."
      }
    }
