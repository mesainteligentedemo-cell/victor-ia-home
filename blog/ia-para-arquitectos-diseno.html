      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Depende del tamaño del despacho y las herramientas elegidas. Un despacho de 5 a 15 personas puede empezar con soluciones de IA para renderizado y gestión de proyectos por entre 8,000 y 25,000 pesos mensuales. Herramientas como Midjourney, Veras o Stable Diffusion para arquitectura cuestan entre 500 y 3,500 pesos mensuales. Los agentes de IA para automatización de propuestas y seguimiento de clientes tienen un costo inicial de implementación que típicamente se recupera en 3 a 5 meses gracias a la reducción de tiempo administrativo."
      }
    },
    {
      "@type": "Question",
      "name": "¿La IA reemplaza al arquitecto o al diseñador?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. La IA automatiza tareas repetitivas y de bajo valor: generación de opciones conceptuales, redacción de propuestas estándar, seguimiento de pagos, coordinación de proveedores, actualización de cronogramas. El criterio de diseño, la interpretación de necesidades del cliente, la resolución de conflictos técnicos y la dirección creativa siguen siendo exclusivamente humanos. Los despachos que mejor usan la IA la tratan como un asistente de alto rendimiento, no como un sustituto."
      }
    },
    {
      "@type": "Question",
      "name": "¿Qué herramientas de IA son más útiles para un despacho pequeño en México?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Para un despacho de 3 a 10 personas, las herramientas con mejor retorno son: 1) Veras o Stable Diffusion para renderizado conceptual rápido (reduce 70% el tiempo de presentación inicial), 2) ChatGPT o Claude para redacción de propuestas, contratos y correos a clientes, 3) ClickUp o Monday con IA para gestión de proyectos, 4) un agente de IA para seguimiento automático de clientes potenciales y cobranza. Victor IA integra estas capacidades en un solo agente configurable para el flujo de trabajo específico de despachos mexicanos."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cómo ayuda la IA con los trámites de permisos y normativa local en México?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Los sistemas de IA pueden procesar y resumir la normativa del Reglamento de Construcciones del CDMX, reglamentos municipales de estados como Jalisco, Nuevo León o Querétaro, y requisitos de IMSS para residentes de obra. Herramientas especializadas pueden generar checklist de documentación por municipio, alertar sobre vencimientos de permisos y redactar oficios estándar para trámites. Sin embargo, la validación legal sigue requiriendo revisión de un director responsable de obra certificado."
      }

      "acceptedAnswer": {
