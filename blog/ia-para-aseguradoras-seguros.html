      "name": "¿Cuánto cuesta implementar IA en una agencia de seguros pequeña en México?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Una agencia independiente con 3 a 10 agentes puede implementar un asistente de IA para cotizaciones y seguimiento con un costo mensual de entre $3,500 y $9,000 MXN, dependiendo del volumen de pólizas y las integraciones requeridas. La recuperación de inversión suele darse entre el segundo y cuarto mes, principalmente por la reducción de tiempo administrativo y el aumento en conversiones de renovación."
      }
    },
    {
      "@type": "Question",
      "name": "¿La IA puede reemplazar a los agentes de seguros en México?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. La IA elimina trabajo operativo repetitivo: capturar datos, generar cotizaciones, enviar recordatorios, clasificar siniestros simples. Los agentes que adoptan IA se liberan para enfocarse en ventas complejas, clientes corporativos y construcción de cartera. Los agentes que integran herramientas de automatización tienden a cerrar más pólizas por mes que quienes no lo hacen, porque dedican más tiempo a prospectar y menos a papelería."
      }
    },
    {
      "@type": "Question",
      "name": "¿La IA para seguros cumple con las regulaciones de la CNSF en México?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí, siempre que la implementación esté diseñada correctamente. La Comisión Nacional de Seguros y Fianzas (CNSF) no prohíbe el uso de IA; lo que regula es la protección de datos del asegurado (alineada con la LFPDPPP) y la transparencia en la toma de decisiones que afecten coberturas. Las plataformas de IA bien configuradas registran cada interacción, generan trazabilidad completa y no toman decisiones finales sobre siniestros sin validación humana, lo que cumple con los lineamientos vigentes."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cuánto tiempo tarda en configurarse un sistema de cotización automatizada con IA?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Para una agencia independiente con catálogo de productos definido, la configuración básica tarda entre 5 y 12 días hábiles. Esto incluye la carga de tarifarios, la integración con WhatsApp o el sitio web, y el entrenamiento del flujo de conversación. Para aseguradoras medianas con múltiples ramos y sistemas core existentes (como AS400 o plataformas propietarias), el proceso puede extenderse a 4-8 semanas según el nivel de integración requerido."
      }
    },
    {
      "@type": "Question",
      "name": "¿Qué pasa con los siniestros complejos que la IA no puede resolver sola?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Los sistemas de IA bien diseñados incluyen lógica de escalamiento automático. Cuando un siniestro supera cierto umbral de complejidad (monto, tipo de daño, litigio potencial), el sistema lo clasifica como prioritario, genera un expediente completo con toda la información recopilada automáticamente y lo transfiere a un ajustador humano. El agente humano recibe el caso con el 80% del trabajo documental ya hecho, lo que reduce su tiempo de resolución a la mitad."
