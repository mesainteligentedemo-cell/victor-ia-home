      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Depende del alcance. Una solución de chatbot para admisiones y comunicación con padres puede costar entre $3,500 y $12,000 MXN mensuales para un colegio de 300 a 800 alumnos. Las plataformas de gestión académica con IA integrada rondan los $18,000 a $45,000 MXN mensuales. El retorno de inversión suele llegar en pocos meses, principalmente por el incremento en inscripciones y la reducción de carga administrativa."
      }
    },
    {
      "@type": "Question",
      "name": "¿La IA puede manejar la comunicación con padres en español mexicano?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí, y con matices regionales. Los modelos de lenguaje actuales, especialmente cuando se entrenan con el tono y vocabulario propio del colegio, responden con naturalidad en español mexicano. Muchos colegios privados ya usan estos sistemas para notificaciones de calificaciones, recordatorios de pagos, respuestas a dudas frecuentes y seguimiento postventa del proceso de admisión. La clave es la fase de configuración inicial: cargar documentos internos, reglamentos y el estilo de comunicación del colegio."
      }

    {
      "@type": "Question",
      "name": "¿Qué pasa con los datos de los alumnos y padres de familia?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Es la pregunta correcta. México no tiene una ley de protección de datos tan robusta como el GDPR europeo, pero la Ley Federal de Protección de Datos Personales en Posesión de los Particulares (LFPDPPP) aplica y exige avisos de privacidad claros, consentimiento informado y medidas de seguridad. Los proveedores serios de IA educativa en México operan con servidores en territorio nacional o con acuerdos de procesamiento de datos que cumplen esta ley. Exige siempre un DPA (Data Processing Agreement) firmado antes de compartir cualquier dato de alumnos."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cuánto tiempo tarda en verse el impacto en inscripciones?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "En captación, el impacto más rápido es en la velocidad de respuesta: un colegio que antes tardaba horas en contestar un WhatsApp de un padre interesado, con IA responde en menos de 2 minutos. Esa rapidez por sí sola tiende a mejorar de forma notable la tasa de conversión. El impacto en número total de inscripciones se mide al cierre del ciclo de admisiones, típicamente entre 3 y 5 meses después de implementar el sistema. Los colegios que arrancan antes de la temporada de inscripciones suelen ver resultados medibles para el siguiente ciclo escolar."
      }
