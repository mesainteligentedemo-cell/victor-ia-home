      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Depende del módulo. Un sistema de optimización de rutas basado en IA puede comenzar desde $8,000 MXN mensuales para flotas de 10 a 30 vehículos. La predicción de demanda con modelos preentrenados arranca desde $12,000 MXN al mes. La automatización de almacén con visión computacional requiere inversiones mayores —entre $150,000 y $600,000 MXN en hardware y configuración— pero el ROI promedio en México se alcanza entre 14 y 22 meses según datos de la AMLOG 2025."
      }

      "@type": "Question",
      "name": "¿Qué datos necesito tener para que la IA funcione en mi cadena de suministro?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Los modelos de predicción de demanda necesitan mínimo 18 meses de historial de ventas por SKU, con fechas, cantidades y ubicación. Para optimización de rutas, se requieren coordenadas de entrega, ventanas de tiempo y registros históricos de tráfico. La buena noticia: si tienes un ERP o TMS con al menos dos años de datos, ya tienes el 80% de lo necesario para comenzar. Las empresas que no tienen datos limpios tardan en promedio 6 semanas en prepararlos antes de activar los modelos."
      }
    },
    {
      "@type": "Question",
      "name": "¿La IA puede ayudar con los problemas de importación y aduanas en México?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí, y es uno de los casos de uso más subestimados. Los modelos de IA entrenados con datos del SAT y del VUCEM pueden predecir tiempos de liberación aduanal con 78% de precisión, identificar pedimentos con riesgo de revisión y sugerir el régimen arancelario óptimo. Empresas importadoras en el corredor Laredo-Monterrey han reducido sus tiempos de cruce promedio de 4.2 horas a 1.9 horas usando estas herramientas."
      }
    },

      "@type": "Question",
      "name": "¿Qué diferencia hay entre un TMS tradicional y un TMS con IA?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Un TMS tradicional ejecuta reglas fijas: si la ruta A está disponible, úsala. Un TMS con IA aprende de cada entrega, ajusta rutas en tiempo real considerando tráfico, clima, ventanas horarias del cliente y costo de combustible simultáneamente. La diferencia en resultados: los TMS tradicionales reducen costos de transporte un 8-12%, mientras que los TMS con IA logran reducciones del 18-27% en el mismo período, según benchmarks de empresas medianas en el Bajío."
