        "text": "No, ni legalmente ni en la práctica. COFEPRIS exige que un farmacéutico certificado supervise la dispensación de medicamentos controlados. Lo que la IA hace es liberar al farmacéutico de tareas repetitivas: conteos de inventario, seguimiento de caducidades, respuesta a preguntas frecuentes en WhatsApp. Eso le permite dedicar más tiempo a la consulta real y a la orientación terapéutica, donde nadie puede sustituirlo."
      }

      "name": "¿Qué datos necesita una farmacia para entrenar un modelo de predicción de demanda?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Con 12 meses de historial de ventas por SKU ya se puede construir un modelo funcional. Lo ideal es tener: fecha y hora de cada venta, SKU vendido, cantidad, precio, y si hubo descuento o promoción activa. Complementar con datos externos —calendario de días festivos, temporadas de influenza, alertas epidemiológicas de la SSA— mejora la precisión del modelo entre un 18% y un 27%, según pruebas con cadenas regionales de entre 8 y 40 sucursales."
      }

      "name": "¿Cómo cumplen las farmacias con la Ley Federal de Protección de Datos al usar IA?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "La LFPDPPP obliga a recabar el consentimiento del cliente antes de procesar sus datos personales con fines distintos a la transacción inmediata. En la práctica, las farmacias deben: publicar un aviso de privacidad visible en el punto de venta y en su sitio web, pedir consentimiento explícito antes de enviar mensajes de marketing por WhatsApp o SMS, y anonimizar los datos clínicos cuando se usan para entrenar modelos. Trabajar con un proveedor de IA que firme un convenio de encargado de datos —como lo exige el INAI— reduce el riesgo legal."
