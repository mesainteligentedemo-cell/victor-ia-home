      "@type": "Question",
      "name": "¿Es legal usar IA en procesos notariales en México?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí, con matices importantes. La Ley del Notariado vigente en estados como CDMX, Jalisco y Nuevo León no prohíbe el uso de herramientas tecnológicas como apoyo al notario. Lo que la ley establece es que la fe pública sigue siendo una función exclusivamente humana: el notario debe revisar, validar y firmar personalmente. La IA puede automatizar la revisión documental, detectar inconsistencias y generar borradores, pero el acto notarial final requiere la intervención del fedatario. El Colegio de Notarios del Distrito Federal publicó en 2024 lineamientos que reconocen explícitamente el uso de herramientas digitales de apoyo, sin que esto sustituya la función del notario."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cuánto cuesta implementar IA en una notaría mediana en México?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Una notaría con 5 a 15 empleados puede implementar automatización de gestión documental y atención a clientes desde $8,000 MXN mensuales con plataformas como Victor IA. Los proyectos más completos, que incluyen integración con sistemas del Registro Público de la Propiedad y validación automática de documentos, oscilan entre $25,000 y $80,000 MXN mensuales según el volumen de escrituras. El retorno de inversión típico se alcanza en 4 a 7 meses, considerando la reducción en horas-hombre para revisión documental y la disminución de errores que generan correcciones costosas."
      }
    },
    {
      "@type": "Question",
      "name": "¿Qué documentos puede revisar la IA en una notaría?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Los modelos actuales de procesamiento de documentos pueden revisar escrituras de compraventa, poderes notariales, testamentos, actas constitutivas, contratos de arrendamiento y fideicomisos. Específicamente, detectan inconsistencias en datos de identificación, fechas, RFC, CURP, datos del inmueble versus lo registrado en el Catastro, y cláusulas que no corresponden al tipo de instrumento. También pueden comparar datos con bases del SAT, RENAPO e INE mediante APIs. Lo que la IA no puede hacer es emitir criterio jurídico sobre la conveniencia del acto: eso sigue siendo trabajo del notario."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cómo funciona la atención automatizada a clientes en una notaría?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Un agente de IA instalado en WhatsApp Business o en la página web de la notaría puede responder consultas frecuentes sobre requisitos de trámites, tiempos de entrega, costos aproximados y estatus de escrituras en proceso. El agente tiene acceso al sistema interno de la notaría para informar al cliente el avance de su expediente sin necesitar intervención del staff. Puede agendar citas, enviar recordatorios automáticos, solicitar documentos faltantes y dar seguimiento post-firma. Notarías que implementan esto reportan una reducción del 60 al 70% en llamadas telefónicas de seguimiento, que consumen en promedio 2.5 horas diarias del personal de atención."
      }
    },
    {
      "@type": "Question",
      "name": "¿El Registro Público de la Propiedad en México ya usa IA?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Sí, de forma parcial y con avance desigual entre estados. El Registro Público de la Propiedad de la CDMX implementó en 2023 un sistema de validación automática de documentos que reduce de 22 días hábiles a 8 días el tiempo promedio de inscripción de escrituras. Jalisco tiene un sistema similar desde 2022. Nuevo León lanzó en 2024 un portal donde los notarios suben los instrumentos y el sistema hace una revisión preliminar automatizada antes de asignarle turno a un registrador humano. Sin embargo, estados como Oaxaca, Guerrero y Chiapas siguen con procesos mayoritariamente manuales, lo que crea una brecha operativa significativa para notarías que trabajan con inmuebles en diferentes entidades."
      }
