<!DOCTYPE html>
<html lang="es-MX">
<head><link rel="icon" href="/favicon.ico" sizes="any"/><link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png"/><link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png"/><link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png"/><link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/><link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png"/><link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#060609">
<title>CRM — Victor IA Brain Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060609; --bg1:#0C0C12; --bg2:#131317; --bg3:#1b1b1f;
  --t1:#F8F7F5; --t2:rgba(248,247,245,.6); --t3:rgba(248,247,245,.35);
  --b:rgba(255,255,255,.09); --b2:rgba(255,255,255,.2);
  --accent:#3B82F6; --accent2:#D8B4FE; --r:16px; --r2:20px;
  --green:#22C55E; --red:#f87171; --gold:#D8B4FE; --orange:#F59E0B;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}

/* ─── TOP NAV ─── */
#topnav{position:sticky;top:0;z-index:100;background:rgba(6,6,9,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--b);display:flex;align-items:center;gap:0;padding:0 28px;height:56px}
.tn-logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800;letter-spacing:-.03em;color:var(--t1);text-decoration:none;margin-right:32px;display:flex;align-items:center;gap:7px}
.tn-logo-dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:inline-block}
.tn-links{display:flex;align-items:center;gap:2px;flex:1}
.tn-link{font-size:13.5px;font-weight:500;color:var(--t3);text-decoration:none;padding:6px 14px;border-radius:10px;transition:color .18s,background .18s;white-space:nowrap}
.tn-link:hover{color:var(--t1);background:rgba(255,255,255,.05)}
.tn-link.active{color:var(--t1);background:rgba(255,255,255,.08)}
.tn-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.tn-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer}

/* ─── LAYOUT ─── */
.page-wrap{max-width:1280px;margin:0 auto;padding:28px 28px 60px}

/* ─── KPI ROW ─── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:28px}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:540px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:18px 20px 16px;cursor:default;position:relative;overflow:hidden;transition:border-color .22s,box-shadow .22s,transform .22s}
.kpi-card:hover{border-color:rgba(59,130,246,.35);box-shadow:0 8px 32px rgba(59,130,246,.12);transform:translateY(-2px)}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.6),transparent);opacity:0;transition:opacity .3s}
.kpi-card:hover::after{opacity:1}
.kpi-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--t3);margin-bottom:10px}
.kpi-value{font-family:'Plus Jakarta Sans',sans-serif;font-size:30px;font-weight:800;letter-spacing:-1.5px;color:var(--t1);line-height:1}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:5px}
.kpi-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:6px}
.kpi-badge.up{background:rgba(34,197,94,.13);color:#22C55E}
.kpi-badge.down{background:rgba(248,113,113,.13);color:#f87171}

/* ─── SECTION HEADER ─── */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.sec-title{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--t3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .18s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--accent),#6D28D9);color:#fff;box-shadow:0 4px 16px rgba(59,130,246,.3)}
.btn-primary:hover{box-shadow:0 6px 24px rgba(59,130,246,.45);transform:translateY(-1px)}
.btn-ghost{background:var(--bg3);border:1px solid var(--b2);color:var(--t2)}
.btn-ghost:hover{background:var(--bg2);color:var(--t1);border-color:rgba(255,255,255,.35)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:8px}

/* ─── SUB-NAV PILLS ─── */
.subnav{display:flex;gap:6px;margin-bottom:24px}
.snpill{padding:7px 18px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--b);color:var(--t3);cursor:pointer;background:transparent;transition:all .18s;font-family:inherit}
.snpill:hover{color:var(--t1);border-color:var(--b2)}
.snpill.active{background:var(--t1);color:var(--bg);border-color:var(--t1);font-weight:600}

/* ─── TAB CONTENT ─── */
.tab-content{display:none}
.tab-content.active{display:block}

/* ─── SEARCH + FILTER BAR ─── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.search-wrap{position:relative;flex:1;max-width:340px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:9px 12px 9px 36px;font-size:13px;color:var(--t1);font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
.search-input::placeholder{color:var(--t3)}
.search-input:focus{border-color:rgba(59,130,246,.6);box-shadow:0 0 0 4px rgba(59,130,246,.1)}
.filter-select{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--t2);font-family:inherit;outline:none;cursor:pointer;transition:border-color .2s}
.filter-select:focus{border-color:rgba(59,130,246,.6)}
.filter-select option{background:var(--bg2);color:var(--t1)}

/* ─── CONTACTS TABLE ─── */
.contacts-table{width:100%;border-collapse:collapse}
.contacts-table th{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);padding:0 16px 12px;text-align:left;border-bottom:1px solid var(--b)}
.contacts-table td{padding:14px 16px;border-bottom:1px solid var(--b);vertical-align:middle}
.contacts-table tr{cursor:pointer;transition:background .16s}
.contacts-table tr:hover td{background:rgba(255,255,255,.025)}
.contact-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.contact-name{font-size:14px;font-weight:600;color:var(--t1)}
.contact-empresa{font-size:12px;color:var(--t3);margin-top:2px}
.status-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.sb-cliente{background:rgba(34,197,94,.13);color:#22C55E}
.sb-propuesta{background:rgba(59,130,246,.13);color:#60a5fa}
.sb-lead{background:rgba(248,247,245,.08);color:var(--t2)}
.sb-perdido{background:rgba(248,113,113,.1);color:#f87171}
.last-activity{font-size:12px;color:var(--t3)}
.table-wrap{background:var(--bg1);border:1px solid var(--b);border-radius:var(--r2);overflow:hidden}

/* ─── KANBAN ─── */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;align-items:start}
@media(max-width:960px){.kanban{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.kanban{grid-template-columns:1fr}}
.kol{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r2);overflow:hidden;min-height:200px;transition:border-color .2s,box-shadow .2s}
.kol.drag-over{border-color:rgba(59,130,246,.5);box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.kol-header{padding:14px 16px 12px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:8px}
.kol-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kol-dot-lead{background:#6B7280}
.kol-dot-propuesta{background:var(--accent)}
.kol-dot-negociacion{background:var(--gold)}
.kol-dot-ganado{background:var(--green)}
.kol-dot-perdido{background:var(--red)}
.kol-title{font-size:13px;font-weight:600;color:var(--t1)}
.kol-count{font-size:11px;font-weight:600;padding:2px 7px;border-radius:12px;background:var(--bg3);color:var(--t3);margin-left:auto}
.kol-total{font-size:11px;color:var(--t3);display:block;margin-top:1px}
.kol-body{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:120px}
.deal-card{background:var(--bg3);border:1px solid var(--b);border-radius:var(--r);padding:13px 14px;cursor:grab;transition:border-color .18s,box-shadow .18s,transform .18s,opacity .18s;user-select:none}
.deal-card:hover{border-color:rgba(59,130,246,.35);box-shadow:0 6px 24px rgba(59,130,246,.1);transform:translateY(-1px)}
.deal-card.dragging{opacity:.45;transform:scale(.97);cursor:grabbing}
.deal-title{font-size:13.5px;font-weight:600;color:var(--t1);margin-bottom:4px}
.deal-empresa{font-size:11px;color:var(--t3);margin-bottom:8px}
.deal-valor{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.5px;color:var(--t1)}
.deal-meta{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.deal-date{font-size:10.5px;color:var(--t3)}
.deal-prob{font-size:10.5px;font-weight:600;color:var(--t2);display:flex;align-items:center;gap:4px}
.prob-bar{width:36px;height:3px;border-radius:2px;background:rgba(255,255,255,.1);overflow:hidden}
.prob-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.add-deal-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;background:transparent;border:1.5px dashed rgba(255,255,255,.1);border-radius:10px;color:var(--t3);font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;font-family:inherit;margin:2px 0 6px}
.add-deal-btn:hover{border-color:rgba(59,130,246,.4);color:var(--accent);background:rgba(59,130,246,.05)}

/* ─── ACTIVITIES ─── */
.act-list{display:flex;flex-direction:column;gap:8px}
.act-item{background:var(--bg2);border:1px solid var(--b);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px;transition:border-color .18s,box-shadow .18s}
.act-item:hover{border-color:rgba(255,255,255,.18);box-shadow:0 4px 20px rgba(0,0,0,.2)}
.act-icon{width:38px;height:38px;border-radius:10px;background:var(--bg3);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.act-body{flex:1;min-width:0}
.act-desc{font-size:13.5px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-contact{font-size:11px;color:var(--t3);margin-top:2px}
.act-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.act-date{font-size:11px;color:var(--t3)}
.act-done-btn{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.act-done-btn.pending{background:rgba(59,130,246,.12);color:var(--accent)}
.act-done-btn.pending:hover{background:rgba(59,130,246,.2)}
.act-done-btn.done{background:rgba(34,197,94,.1);color:#22C55E;cursor:default}
.act-item.done-item{opacity:.6}

/* ─── MODALS ─── */
.overlay{position:fixed;inset:0;background:rgba(6,6,9,.82);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--b2);border-radius:var(--r2);width:100%;max-width:480px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:mIn .22s cubic-bezier(.4,0,.2,1)}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:none}}
.modal-head{padding:20px 22px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.modal-close{width:30px;height:30px;border-radius:8px;background:var(--bg3);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);transition:all .15s}
.modal-close:hover{background:var(--bg2);color:var(--t1)}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1}
.modal-body::-webkit-scrollbar{display:none}
.modal-footer{padding:14px 22px 20px;border-top:1px solid var(--b);display:flex;gap:10px;justify-content:flex-end}
.form-group{margin-bottom:14px}
.form-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);display:block;margin-bottom:7px}
.form-input{width:100%;background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:10px 13px;font-size:13.5px;color:var(--t1);font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
.form-input::placeholder{color:var(--t3)}
.form-input:focus{border-color:rgba(59,130,246,.6);box-shadow:0 0 0 4px rgba(59,130,246,.1)}
.form-input[type=number]{-moz-appearance:textfield}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
textarea.form-input{resize:vertical;min-height:72px}

/* ─── EMPTY STATE ─── */
.empty-state{text-align:center;padding:52px 24px}
.empty-icon{font-size:36px;margin-bottom:14px;opacity:.5}
.empty-title{font-size:15px;font-weight:600;color:var(--t2);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--t3)}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}

/* ─── DETAIL PANEL ─── */
.detail-backdrop{position:fixed;inset:0;z-index:149;display:none;background:rgba(0,0,0,.45);backdrop-filter:blur(3px)}
.detail-backdrop.open{display:block}
.detail-panel{position:fixed;top:0;right:0;height:100vh;width:440px;background:var(--bg1);border-left:1px solid var(--b2);z-index:150;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.detail-panel.open{transform:translateX(0)}
@media(max-width:520px){.detail-panel{width:100vw}}
.dp-head{padding:20px 22px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dp-close{width:30px;height:30px;border-radius:8px;background:var(--bg3);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);transition:all .15s}
.dp-close:hover{background:var(--bg2);color:var(--t1)}
.dp-body{flex:1;overflow-y:auto;padding:20px 22px 40px}
.dp-body::-webkit-scrollbar{display:none}
.dp-section{margin-bottom:22px}
.dp-section-title{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.dp-info-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;color:var(--t2)}
.dp-info-row:last-child{border-bottom:none}
.dp-info-label{font-size:11px;color:var(--t3);width:70px;flex-shrink:0}
.dp-deal-card{background:var(--bg3);border:1px solid var(--b);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .18s}
.dp-deal-card:hover{border-color:rgba(59,130,246,.35)}
.dp-act-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px}
.dp-act-item:last-child{border-bottom:none}
.dp-footer{padding:14px 22px 20px;border-top:1px solid var(--b);display:flex;gap:8px;flex-shrink:0;background:var(--bg1)}

/* ─── TOAST ─── */
.toast-container{position:fixed;top:68px;right:20px;z-index:400;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--b2);border-radius:12px;padding:11px 16px;font-size:13px;color:var(--t1);display:flex;align-items:center;gap:9px;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,.4);pointer-events:auto;animation:toastIn .25s cubic-bezier(.4,0,.2,1)}
.toast.success{border-color:rgba(34,197,94,.35)}
.toast.error{border-color:rgba(248,113,113,.35)}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateX(16px)}}

/* ─── ORBS BG ─── */
#orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.05}
.orb1{width:600px;height:600px;background:var(--accent);top:-150px;left:-100px;animation:orbDrift1 18s ease-in-out infinite}
.orb2{width:500px;height:500px;background:var(--accent2);bottom:-100px;right:-80px;animation:orbDrift2 22s ease-in-out infinite}
@keyframes orbDrift1{0%,100%{transform:translate(0,0)}40%{transform:translate(60px,-40px)}70%{transform:translate(-30px,50px)}}
@keyframes orbDrift2{0%,100%{transform:translate(0,0)}35%{transform:translate(-55px,35px)}70%{transform:translate(40px,-45px)}}
#app-content{position:relative;z-index:1}
</style>
<script defer src="https://victor-ia-brain-tracker.vercel.app/vi-track.js" data-site="victor-ia-home"></script>
  <link rel="stylesheet" href="/assets/animations.css?v=1">
</head>
<body>
<div id="orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<div id="app-content">

<!-- TOP NAV -->
<nav id="topnav">
  <a href="#" class="tn-logo"><span class="tn-logo-dot"></span>Victor IA</a>
  <div class="tn-links">
    <a href="/" class="tn-link">Brain</a>
    <a href="/studio" class="tn-link">Studio</a>
    <a href="/dashboard" class="tn-link">Dashboard</a>
    <a href="/cms" class="tn-link">CMS</a>
    <a href="crm.html" class="tn-link active">CRM</a>
  </div>
  <div class="tn-right">
    <div class="tn-avatar">V</div>
  </div>
</nav>

<!-- PAGE -->
<div class="page-wrap">

  <!-- KPI ROW -->
  <div class="kpi-row" id="kpi-row"></div>

  <!-- SECTION HEADER -->
  <div class="sec-header">
    <span class="sec-title">Pipeline</span>
  </div>

  <!-- SUB-NAV -->
  <div class="subnav">
    <button class="snpill active" onclick="switchTab('contactos',this)">Contactos</button>
    <button class="snpill" onclick="switchTab('pipeline',this)">Pipeline</button>
    <button class="snpill" onclick="switchTab('actividades',this)">Actividades</button>
  </div>

  <!-- ── CONTACTOS TAB ── -->
  <div class="tab-content active" id="tab-contactos">
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="search-input" type="text" id="contact-search" placeholder="Buscar contacto..." oninput="renderContacts()">
      </div>
      <select class="filter-select" id="contact-filter" onchange="renderContacts()">
        <option value="">Todos</option>
        <option value="Cliente">Cliente</option>

<script>
// ── STORAGE ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 'vib-crm-v2';

const SEED = {
  contacts: [
    {id:'c001',nombre:'Samir El Sharkawi',empresa:'Particular',cargo:'Empresario',email:'samir@sharkawi.mx',tel:'+52 55 1234 5678',estado:'Cliente',notas:'Video residencial.',createdAt:'2026-01-15',lastActivity:'2026-05-06'},
    {id:'c002',nombre:'Aldo Rendón',empresa:'Remi Creative',cargo:'Director Creativo',email:'aldo@remicreative.com',tel:'',estado:'Propuesta',notas:'Deck enviado.',createdAt:'2026-03-10',lastActivity:'2026-05-05'},
    {id:'c003',nombre:'Lilia Solís',empresa:'ROES & Co',cargo:'Directora General',email:'lilia@roesco.mx',tel:'',estado:'Propuesta',notas:'$68k SEO+Web.',createdAt:'2026-04-15',lastActivity:'2026-05-03'},
    {id:'c004',nombre:'Jimena Rodríguez',empresa:'Academia USA',cargo:'CEO',email:'jimena@academia.us',tel:'',estado:'Propuesta',notas:'3 fases LMS.',createdAt:'2026-05-01',lastActivity:'2026-05-07'}
  ],
  deals: [
    {id:'d001',titulo:'Video residencial',contactId:'c001',empresa:'Particular',valor:45000,moneda:'MXN',etapa:'Ganado',prob:100,fechaCierre:'2026-02-28',notas:''},
    {id:'d002',titulo:'Remi Creative',contactId:'c002',empresa:'Remi Creative',valor:28000,moneda:'MXN',etapa:'Propuesta',prob:55,fechaCierre:'2026-06-01',notas:''},
    {id:'d003',titulo:'SEO + Web ROES',contactId:'c003',empresa:'ROES & Co',valor:68000,moneda:'MXN',etapa:'Propuesta',prob:40,fechaCierre:'2026-06-15',notas:''},
    {id:'d004',titulo:'LMS Academia',contactId:'c004',empresa:'Academia USA',valor:7500,moneda:'USD',etapa:'Propuesta',prob:55,fechaCierre:'2026-05-31',notas:''}
  ],
  activities: [
    {id:'a001',tipo:'📤',desc:'Deck enviado a Aldo Rendón',contactId:'c002',fecha:'2026-05-05',done:false},
    {id:'a002',tipo:'📅',desc:'Reunión de cierre ROES',contactId:'c003',fecha:'2026-05-10',done:false},
    {id:'a003',tipo:'✉️',desc:'Follow-up propuesta Jimena',contactId:'c004',fecha:'2026-05-08',done:false},
    {id:'a004',tipo:'📞',desc:'Llamada entrega video Samir',contactId:'c001',fecha:'2026-05-06',done:true}
  ]
};

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d = JSON.parse(raw);
      if(d && d.contacts && d.deals && d.activities) return d;
    }
  }catch(e){}
  localStorage.setItem(STORAGE_KEY, JSON.stringify(SEED));
  return JSON.parse(JSON.stringify(SEED));
}
function saveData(d){ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function uid(){ return '_'+Math.random().toString(36).substr(2,9); }

let DB = loadData();

// ── HELPERS ──────────────────────────────────────────────────────────────
function fmtMXN(v, moneda='MXN'){
  if(moneda==='USD') return '$'+Number(v).toLocaleString('en-US')+' USD';
  return '$'+Number(v).toLocaleString('es-MX')+' MXN';
}
function fmtDate(s){
  if(!s) return '—';
  const d = new Date(s+'T12:00:00');
  return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});
}
function today(){
  return new Date().toISOString().split('T')[0];
}
function avatarColor(name){
  const colors=['#3B82F6','#8B5CF6','#EC4899','#10B981','#F59E0B','#EF4444','#6366F1'];
  let h=0; for(let c of name) h=c.charCodeAt(0)+h*31;
  return colors[Math.abs(h)%colors.length];
}
function statusBadgeClass(s){
  const m={Cliente:'sb-cliente',Propuesta:'sb-propuesta',Lead:'sb-lead',Perdido:'sb-perdido'};
  return m[s]||'sb-lead';
}
function contactName(id){
  const c = DB.contacts.find(x=>x.id===id);
  return c ? c.nombre : '—';
}

// ── KPI ──────────────────────────────────────────────────────────────────
function renderKPIs(){
  const total = DB.contacts.length;
  const open = DB.deals.filter(d=>d.etapa!=='Ganado').length;
  const pipeline = DB.deals.filter(d=>d.etapa!=='Ganado').reduce((s,d)=>s+(d.moneda==='USD'?d.valor*17:d.valor),0);
  const ganados = DB.deals.filter(d=>d.etapa==='Ganado');
  const revenue = ganados.reduce((s,d)=>s+(d.moneda==='USD'?d.valor*17:d.valor),0);
  const conv = DB.deals.length ? Math.round((ganados.length/DB.deals.length)*100) : 0;

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Contactos</div>
      <div class="kpi-value">${total}</div>
      <div class="kpi-sub">en base de datos</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Deals abiertos</div>
      <div class="kpi-value">${open}</div>
      <div class="kpi-sub">en progreso</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Pipeline $</div>
      <div class="kpi-value" style="font-size:22px">${'$'+Math.round(pipeline/1000)+'k'}</div>
      <div class="kpi-sub">MXN equivalente</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Conversión %</div>
      <div class="kpi-value">${conv}<span style="font-size:18px;font-weight:600">%</span></div>
      <div class="kpi-sub">${ganados.length} de ${DB.deals.length} deals</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Revenue ganado</div>
      <div class="kpi-value" style="font-size:22px">${'$'+Math.round(revenue/1000)+'k'}</div>
      <div class="kpi-sub">MXN equivalente</div>
    </div>
  `;
}

// ── CONTACTS ─────────────────────────────────────────────────────────────
function renderContacts(){
  const q = (document.getElementById('contact-search').value||'').toLowerCase();
  const f = document.getElementById('contact-filter').value;
  let list = DB.contacts.filter(c=>{
    const match = !q || c.nombre.toLowerCase().includes(q) || c.empresa.toLowerCase().includes(q) || c.email.toLowerCase().includes(q);
    const stateMatch = !f || c.estado===f;
    return match && stateMatch;
  });
  const tbody = document.getElementById('contacts-tbody');
  const empty = document.getElementById('contacts-empty');
  if(!list.length){
    tbody.innerHTML=''; empty.style.display=''; return;
  }
  empty.style.display='none';
  tbody.innerHTML = list.map(c=>`
    <tr onclick="openContactDetail('${c.id}')">
      <td><div class="contact-avatar" style="background:${avatarColor(c.nombre)}">${c.nombre.charAt(0)}</div></td>
      <td>
        <div class="contact-name">${c.nombre}</div>
        <div class="contact-empresa">${c.cargo||''}</div>
      </td>
      <td><div class="contact-empresa" style="font-size:13px;color:var(--t2)">${c.empresa}</div></td>
      <td><span class="status-badge ${statusBadgeClass(c.estado)}">${c.estado}</span></td>
      <td><span class="last-activity">${fmtDate(c.lastActivity)}</span></td>
      <td><button class="btn btn-ghost btn-sm" onclick="editContact('${c.id}');event.stopPropagation()">Editar</button></td>
    </tr>
  `).join('');
}

// ── KANBAN ────────────────────────────────────────────────────────────────
const COLS = [
  {id:'Lead',label:'Lead',dot:'kol-dot-lead',color:'#6B7280'},
  {id:'Propuesta',label:'Propuesta',dot:'kol-dot-propuesta',color:'#3B82F6'},
  {id:'Negociación',label:'Negociación',dot:'kol-dot-negociacion',color:'#D8B4FE'},
  {id:'Ganado',label:'Ganado',dot:'kol-dot-ganado',color:'#22C55E'},
  {id:'Perdido',label:'Perdido',dot:'kol-dot-perdido',color:'#f87171'}
];

let dragDealId = null;

function renderKanban(){
  const board = document.getElementById('kanban-board');
  board.innerHTML = COLS.map(col=>{
    const deals = DB.deals.filter(d=>d.etapa===col.id);
    const total = deals.reduce((s,d)=>s+(d.moneda==='USD'?d.valor*17:d.valor),0);
    return `
      <div class="kol" id="kol-${col.id}"
        ondragover="onDragOver(event,'${col.id}')"
        ondrop="onDrop(event,'${col.id}')"
        ondragleave="onDragLeave(event,'${col.id}')">
        <div class="kol-header">
          <div class="kol-dot ${col.dot}"></div>
          <div>
            <div class="kol-title">${col.label}</div>
            <span class="kol-total">${'$'+Math.round(total/1000)+'k MXN'}</span>
          </div>
          <div class="kol-count">${deals.length}</div>
        </div>
        <div class="kol-body" id="kol-body-${col.id}">
          ${deals.map(d=>dealCard(d)).join('')}
          <button class="add-deal-btn" onclick="openModal('deal','${col.id}')">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            Deal
          </button>
        </div>
      </div>
    `;
  }).join('');

  // attach drag events
  document.querySelectorAll('.deal-card').forEach(el=>{
    el.addEventListener('dragstart', e=>{
      dragDealId = el.dataset.id;
      setTimeout(()=>el.classList.add('dragging'),0);
    });
    el.addEventListener('dragend', ()=>{
      el.classList.remove('dragging');
      dragDealId = null;
    });
  });
}

function dealCard(d){
  const c = DB.contacts.find(x=>x.id===d.contactId);
  const av = c ? `<div style="width:20px;height:20px;border-radius:50%;background:${avatarColor(c.nombre)};display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;margin-right:5px;flex-shrink:0">${c.nombre.charAt(0)}</div>` : '';
  return `
    <div class="deal-card" data-id="${d.id}" draggable="true" onclick="editDeal('${d.id}')">
      <div class="deal-title">${d.titulo}</div>
      <div class="deal-empresa" style="display:flex;align-items:center">${av}<span>${d.empresa}</span></div>
      <div class="deal-valor">${fmtMXN(d.valor,d.moneda)}</div>
      <div class="deal-meta">
        <span class="deal-date">${fmtDate(d.fechaCierre)}</span>
        <div class="deal-prob">
          <div class="prob-bar"><div class="prob-fill" style="width:${d.prob}%"></div></div>
          ${d.prob}%
        </div>
      </div>
    </div>
  `;
}

function onDragOver(e, colId){
  e.preventDefault();
  document.getElementById('kol-'+colId).classList.add('drag-over');
}
function onDragLeave(e, colId){
  document.getElementById('kol-'+colId).classList.remove('drag-over');
}
function onDrop(e, colId){
  e.preventDefault();
  document.getElementById('kol-'+colId).classList.remove('drag-over');
  if(!dragDealId) return;
  const deal = DB.deals.find(d=>d.id===dragDealId);
  if(deal && deal.etapa!==colId){
    deal.etapa = colId;
    saveData(DB);
    renderKanban();
    renderKPIs();
  }
}

// ── ACTIVITIES ────────────────────────────────────────────────────────────
function renderActividades(){
  const sorted = [...DB.activities].sort((a,b)=>{
    if(a.done !== b.done) return a.done ? 1 : -1;
    return new Date(b.fecha) - new Date(a.fecha);
  });
  const list = document.getElementById('act-list');
  const empty = document.getElementById('act-empty');
  if(!sorted.length){ list.innerHTML=''; empty.style.display=''; return; }
  empty.style.display='none';
  list.innerHTML = sorted.map(a=>`
    <div class="act-item${a.done?' done-item':''}" id="act-${a.id}">
      <div class="act-icon">${a.tipo}</div>
      <div class="act-body">
        <div class="act-desc">${a.desc}</div>
        <div class="act-contact">${contactName(a.contactId)}</div>
      </div>
      <div class="act-right">
        <span class="act-date">${fmtDate(a.fecha)}</span>
        <button class="act-done-btn ${a.done?'done':'pending'}" onclick="toggleDone('${a.id}')">${a.done?'Completada':'Marcar lista'}</button>
      </div>
    </div>
  `).join('');
}

function toggleDone(id){
  const a = DB.activities.find(x=>x.id===id);
  if(a){ a.done = !a.done; saveData(DB); renderActividades(); }
}

// ── TABS ─────────────────────────────────────────────────────────────────
function switchTab(name, btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.snpill').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='pipeline') renderKanban();
  if(name==='actividades') renderActividades();
}

// ── MODALS ────────────────────────────────────────────────────────────────
let _dealDefaultEtapa = null;

function openModal(type, extra){
  if(type==='contact'){
    document.getElementById('modal-contact-title').textContent = 'Nuevo contacto';
    document.getElementById('c-id').value='';
    ['c-nombre','c-empresa','c-cargo','c-email','c-tel','c-notas'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('c-estado').value='Lead';
    document.getElementById('modal-contact').classList.add('open');
  }
  if(type==='deal'){
    _dealDefaultEtapa = extra||null;
    document.getElementById('modal-deal-title').textContent = 'Nuevo deal';
    document.getElementById('d-id').value='';
    ['d-titulo','d-empresa','d-notas'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('d-valor').value='';
    document.getElementById('d-prob').value='50';
    document.getElementById('d-fecha').value = today();
    document.getElementById('d-moneda').value='MXN';
    document.getElementById('d-etapa').value = extra||'Lead';
    populateContactSelect('d-contactId','');
    document.getElementById('deal-del-btn').style.display='none';
    document.getElementById('modal-deal').classList.add('open');
  }
  if(type==='actividad'){
    ['a-desc'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('a-fecha').value = today();
    document.getElementById('a-tipo').value='📞';
    populateContactSelect('a-contactId','');
    document.getElementById('modal-actividad').classList.add('open');
  }
}
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function closeModalBg(e,id){ if(e.target.classList.contains('overlay')) closeModal(id); }

function populateContactSelect(selectId, selectedId){
  const sel = document.getElementById(selectId);
  sel.innerHTML = '<option value="">— Sin contacto —</option>' +
    DB.contacts.map(c=>`<option value="${c.id}"${c.id===selectedId?' selected':''}>${c.nombre}</option>`).join('');
}

function editContact(id){
  const c = DB.contacts.find(x=>x.id===id);
  if(!c) return;
  document.getElementById('modal-contact-title').textContent = 'Editar contacto';
  document.getElementById('c-id').value = c.id;
  document.getElementById('c-nombre').value = c.nombre||'';
  document.getElementById('c-empresa').value = c.empresa||'';
  document.getElementById('c-cargo').value = c.cargo||'';
  document.getElementById('c-email').value = c.email||'';
  document.getElementById('c-tel').value = c.tel||'';
  document.getElementById('c-estado').value = c.estado||'Lead';
  document.getElementById('c-notas').value = c.notas||'';
  document.getElementById('modal-contact').classList.add('open');
}

function editDeal(id){
  const d = DB.deals.find(x=>x.id===id);
  if(!d) return;
  document.getElementById('modal-deal-title').textContent = 'Editar deal';
  document.getElementById('d-id').value = d.id;
  document.getElementById('d-titulo').value = d.titulo||'';
  document.getElementById('d-empresa').value = d.empresa||'';
  document.getElementById('d-valor').value = d.valor||'';
  document.getElementById('d-moneda').value = d.moneda||'MXN';
  document.getElementById('d-etapa').value = d.etapa||'Lead';
  document.getElementById('d-prob').value = d.prob||50;
  document.getElementById('d-fecha').value = d.fechaCierre||today();
  document.getElementById('d-notas').value = d.notas||'';
  populateContactSelect('d-contactId', d.contactId||'');
  document.getElementById('deal-del-btn').style.display='inline-flex';
  document.getElementById('modal-deal').classList.add('open');
}

// ── SAVE ─────────────────────────────────────────────────────────────────
function saveContact(){
  const id = document.getElementById('c-id').value;
  const obj = {
    id: id||uid(),
    nombre: document.getElementById('c-nombre').value.trim(),
    empresa: document.getElementById('c-empresa').value.trim(),
    cargo: document.getElementById('c-cargo').value.trim(),
    email: document.getElementById('c-email').value.trim(),
    tel: document.getElementById('c-tel').value.trim(),
    estado: document.getElementById('c-estado').value,
    notas: document.getElementById('c-notas').value.trim(),
    createdAt: id ? (DB.contacts.find(x=>x.id===id)||{}).createdAt||today() : today(),
    lastActivity: today()
  };
  if(!obj.nombre){ showToast('El nombre es obligatorio.','error'); return; }
  if(id){ const i=DB.contacts.findIndex(x=>x.id===id); if(i>-1) DB.contacts[i]=obj; }
  else DB.contacts.push(obj);
  saveData(DB);
  closeModal('modal-contact');
  renderContacts();
  renderKPIs();
  showToast(id ? 'Contacto actualizado ✓' : 'Contacto creado ✓');
}

function saveDeal(){
  const id = document.getElementById('d-id').value;
  const obj = {
    id: id||uid(),
    titulo: document.getElementById('d-titulo').value.trim(),
    contactId: document.getElementById('d-contactId').value,
    empresa: document.getElementById('d-empresa').value.trim(),
    valor: parseFloat(document.getElementById('d-valor').value)||0,
    moneda: document.getElementById('d-moneda').value,
    etapa: document.getElementById('d-etapa').value,
    prob: parseInt(document.getElementById('d-prob').value)||50,
    fechaCierre: document.getElementById('d-fecha').value,
    notas: document.getElementById('d-notas').value.trim()
  };
  if(!obj.titulo){ showToast('El título es obligatorio.','error'); return; }
  if(id){ const i=DB.deals.findIndex(x=>x.id===id); if(i>-1) DB.deals[i]=obj; }
  else DB.deals.push(obj);
  saveData(DB);
  closeModal('modal-deal');
  renderKanban();
  renderKPIs();
  showToast(id ? 'Deal actualizado ✓' : 'Deal creado ✓');
}

function saveActividad(){
  const obj = {
    id: uid(),
    tipo: document.getElementById('a-tipo').value,
    desc: document.getElementById('a-desc').value.trim(),
    contactId: document.getElementById('a-contactId').value,
    fecha: document.getElementById('a-fecha').value||today(),
    done: false
  };
  if(!obj.desc){ showToast('Agrega una descripción.','error'); return; }
  DB.activities.unshift(obj);
  // update lastActivity on contact
  if(obj.contactId){
    const c = DB.contacts.find(x=>x.id===obj.contactId);
    if(c) c.lastActivity = obj.fecha;
  }
  saveData(DB);
  closeModal('modal-actividad');
  renderActividades();
  showToast('Actividad guardada ✓');
}

// ── TOAST ────────────────────────────────────────────────────────────────
function showToast(msg, type='success'){
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = `<span>${type==='success'?'✓':'⚠'}</span>${msg}`;
  c.appendChild(t);
  setTimeout(()=>{t.style.animation='toastOut .25s cubic-bezier(.4,0,.2,1) forwards';setTimeout(()=>t.remove(),260);},2600);
}

// ── CONTACT DETAIL PANEL ─────────────────────────────────────────────────
let _dpContactId = null;

function openContactDetail(id){
  const c = DB.contacts.find(x=>x.id===id);
  if(!c) return;
  _dpContactId = id;
  document.getElementById('dp-nombre').textContent = c.nombre;

  const contactDeals = DB.deals.filter(d=>d.contactId===id);
  const contactActs = DB.activities.filter(a=>a.contactId===id).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const sc={'Cliente':'#22C55E','Propuesta':'#3B82F6','Lead':'#6B7280','Perdido':'#f87171'};
  document.getElementById('dp-body').innerHTML = `
    <!-- Info -->
    <div class="dp-section">
      <div class="dp-section-title">Información</div>
      ${c.email?`<div class="dp-info-row"><span class="dp-info-label">Email</span><a href="mailto:${c.email}" style="color:var(--accent);text-decoration:none">${c.email}</a></div>`:''}
      ${c.tel?`<div class="dp-info-row"><span class="dp-info-label">Teléfono</span><span>${c.tel}</span></div>`:''}
      <div class="dp-info-row"><span class="dp-info-label">Estado</span><span class="status-badge ${statusBadgeClass(c.estado)}">${c.estado}</span></div>
      <div class="dp-info-row"><span class="dp-info-label">Última act.</span><span>${fmtDate(c.lastActivity)}</span></div>
      ${c.notas?`<div class="dp-info-row" style="align-items:flex-start"><span class="dp-info-label">Notas</span><span style="color:var(--t2);line-height:1.5">${c.notas}</span></div>`:''}
    </div>
    <!-- Deals -->
    <div class="dp-section">
      <div class="dp-section-title"><span>Deals (${contactDeals.length})</span><button onclick="openModal('deal');document.getElementById('d-contactId').value='${id}'" style="font-size:11px;background:transparent;border:none;color:var(--accent);cursor:pointer;font-family:inherit">+ Deal</button></div>
      ${contactDeals.length ? contactDeals.map(d=>`
        <div class="dp-deal-card" onclick="editDeal('${d.id}')">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <div style="font-size:13px;font-weight:600;color:var(--t1)">${d.titulo}</div>
            <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:12px;background:rgba(59,130,246,.12);color:#60a5fa">${d.etapa}</span>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
            <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:700">${fmtMXN(d.valor,d.moneda)}</span>
            <span style="font-size:11px;color:var(--t3)">${d.prob}% · ${fmtDate(d.fechaCierre)}</span>
          </div>
        </div>
      `).join('') : '<div style="font-size:13px;color:var(--t3);padding:8px 0">Sin deals asociados</div>'}
    </div>
    <!-- Actividades -->
    <div class="dp-section">
      <div class="dp-section-title"><span>Actividades (${contactActs.length})</span><button onclick="openModal('actividad');setTimeout(()=>document.getElementById('a-contactId').value='${id}',50)" style="font-size:11px;background:transparent;border:none;color:var(--accent);cursor:pointer;font-family:inherit">+ Act.</button></div>
      ${contactActs.length ? contactActs.map(a=>`
        <div class="dp-act-item${a.done?' done-item':''}">
          <div style="width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${a.tipo}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;color:${a.done?'var(--t3)':'var(--t1)'};text-decoration:${a.done?'line-through':'none'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.desc}</div>
            <div style="font-size:11px;color:var(--t3)">${fmtDate(a.fecha)}</div>
          </div>
          ${!a.done?`<button onclick="toggleDone('${a.id}')" style="font-size:10px;padding:3px 8px;border-radius:7px;background:rgba(59,130,246,.1);color:var(--accent);border:none;cursor:pointer;white-space:nowrap;font-family:inherit">✓ Listo</button>`:''}
        </div>
      `).join('') : '<div style="font-size:13px;color:var(--t3);padding:8px 0">Sin actividades aún.</div>'}
    </div>
  `;
  document.getElementById('dp-footer').innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="editContact('${id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar</button>
    <button class="btn btn-ghost btn-sm" onclick="openModal('actividad');setTimeout(()=>document.getElementById('a-contactId').value='${id}',50)">+ Actividad</button>
    <button class="btn btn-sm" style="background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.2);color:#f87171;margin-left:auto" onclick="deleteContact('${id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>

function closeDetailPanel(){
  document.getElementById('dp-backdrop').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
  _dpContactId = null;
}

// ── DELETE ────────────────────────────────────────────────────────────────
function deleteContact(id){
  if(!confirm('¿Eliminar este contacto? También se eliminarán sus deals y actividades.')) return;
  DB.contacts = DB.contacts.filter(x=>x.id!==id);
  DB.deals = DB.deals.filter(x=>x.contactId!==id);
  DB.activities = DB.activities.filter(x=>x.contactId!==id);
  saveData(DB); closeDetailPanel(); renderContacts(); renderKPIs(); renderKanban();
  showToast('Contacto eliminado');
}

function deleteDeal(id){
  if(!confirm('¿Eliminar este deal?')) return;
  DB.deals = DB.deals.filter(x=>x.id!==id);
  saveData(DB); closeModal('modal-deal'); renderKanban(); renderKPIs();
  showToast('Deal eliminado');
}

// ── INIT ─────────────────────────────────────────────────────────────────
renderKPIs();
renderContacts();
</script>
