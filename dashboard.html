﻿<!DOCTYPE html>
<html lang="es-MX">
<head><link rel="icon" href="/favicon.ico" sizes="any"/><link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png"/><link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png"/><link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png"/><link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png"/><link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png"/><link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#060609">
<title>Dashboard BI — Victor IA Brain Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060609; --bg1:#0C0C12; --bg2:#131317; --bg3:#1b1b1f;
  --t1:#F8F7F5; --t2:rgba(248,247,245,.6); --t3:rgba(248,247,245,.35);
  --b:rgba(255,255,255,.09); --b2:rgba(255,255,255,.2);
  --accent:#3B82F6; --accent2:#D8B4FE; --r:16px; --r2:20px;
  --gold:#D8B4FE;
  --cat-ia:#3B82F6;
  --cat-skill:#D8B4FE;
  --cat-cliente:#34d399;
  --cat-proyecto:#f97316;
  --cat-admin:#94a3b8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--t1);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── NAV ─────────────────────────────────────────────────────── */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(6,6,9,.85);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--b);
  padding:0 32px;
  height:60px;
  display:flex;align-items:center;gap:32px;
}
.nav-logo{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:16px;font-weight:800;letter-spacing:-.5px;
  color:var(--t1);
  margin-right:16px;
  flex-shrink:0;
}
.nav-logo span{color:var(--accent);}
.nav-links{display:flex;align-items:center;gap:4px;flex:1;}
.nav-links a{
  font-size:13px;font-weight:500;color:var(--t3);
  text-decoration:none;padding:6px 12px;border-radius:8px;
  transition:color .2s,background .2s;
}
.nav-links a:hover{color:var(--t1);background:var(--bg3);}
.nav-links a.active{color:var(--t1);background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.2);}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn-crm{
  background:var(--accent);color:#fff;
  font-size:12px;font-weight:600;letter-spacing:.3px;
  padding:7px 16px;border-radius:8px;
  text-decoration:none;border:none;cursor:pointer;
  transition:opacity .2s,transform .2s;
}
.btn-crm:hover{opacity:.85;transform:translateY(-1px);}

/* ── MAIN ─────────────────────────────────────────────────────── */
main{max-width:1280px;margin:0 auto;padding:32px 24px 120px;}

/* ── PAGE HEADER ─────────────────────────────────────────────── */
.page-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:28px;flex-wrap:wrap;gap:16px;
}
.page-header h1{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:28px;font-weight:800;letter-spacing:-1px;
  color:var(--t1);
}
.page-header p{font-size:14px;color:var(--t2);margin-top:4px;}

/* ── FILTROS ─────────────────────────────────────────────────── */
.filters{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{
  font-size:12px;font-weight:600;color:var(--t3);
  background:var(--bg2);border:1px solid var(--b);
  padding:6px 14px;border-radius:8px;cursor:pointer;
  transition:all .2s;
}
.filter-btn:hover{color:var(--t1);border-color:var(--b2);}
.filter-btn.active{
  color:#fff;background:rgba(59,130,246,.18);
  border-color:rgba(59,130,246,.4);
}

/* ── SECTION TITLE ───────────────────────────────────────────── */
.section-title{
  font-size:11px;font-weight:600;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--t3);
  margin-bottom:14px;margin-top:32px;
}

/* ── KPI GRID ────────────────────────────────────────────────── */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:14px;
}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:420px){.kpi-grid{grid-template-columns:1fr;}}

.kpi-card{
  background:var(--bg2);border:1px solid var(--b);
  border-radius:var(--r2);padding:20px;
  transition:transform .2s,border-color .2s;
  position:relative;overflow:hidden;
  cursor:default;
}
.kpi-card:hover{transform:translateY(-2px);border-color:rgba(59,130,246,.4);}
.kpi-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  opacity:.7;border-radius:var(--r2) var(--r2) 0 0;
}
.kpi-card.gold::after{background:linear-gradient(90deg,var(--gold),#f59e0b);}
.kpi-card.purple::after{background:linear-gradient(90deg,var(--accent2),#a78bfa);}
.kpi-card.green::after{background:linear-gradient(90deg,#34d399,#10b981);}
.kpi-card.orange::after{background:linear-gradient(90deg,#f97316,#fb923c);}
.kpi-label{
  font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
  color:var(--t3);margin-bottom:12px;
}
.kpi-number{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:36px;font-weight:800;letter-spacing:-1.5px;
  color:var(--t1);line-height:1;
}
.kpi-unit{font-size:14px;font-weight:600;color:var(--t2);margin-left:2px;}
.kpi-sub{font-size:12px;color:var(--t3);margin-top:8px;}

/* ── BAR CHART ──────────────────────────────────────────────── */
.chart-card{
  background:var(--bg2);border:1px solid var(--b);
  border-radius:var(--r2);padding:24px;
  margin-top:0;
}
.chart-bars{
  display:flex;align-items:flex-end;gap:6px;
  height:120px;margin-top:16px;
}
.bar-col{
  flex:1;display:flex;flex-direction:column;
  align-items:center;gap:6px;min-width:0;
}
.bar-wrap{
  width:100%;background:var(--bg3);border-radius:6px 6px 0 0;
  position:relative;overflow:hidden;
  min-height:4px;
  transition:height .5s cubic-bezier(.4,0,.2,1);
}
.bar-fill{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(180deg,var(--accent),rgba(59,130,246,.4));
  border-radius:6px 6px 0 0;
  transition:height .6s cubic-bezier(.4,0,.2,1);
}
.bar-fill.today{background:linear-gradient(180deg,var(--gold),rgba(251,191,36,.5));}
.bar-date{
  font-size:9px;font-weight:600;color:var(--t3);
  letter-spacing:.3px;text-align:center;white-space:nowrap;
}
.bar-val{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--t2);
  position:absolute;top:-18px;left:50%;transform:translateX(-50%);
  white-space:nowrap;
}

/* ── TWO COL GRID ────────────────────────────────────────────── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:800px){.two-col{grid-template-columns:1fr;}}

/* ── BREAKDOWN ───────────────────────────────────────────────── */
.breakdown-list{display:flex;flex-direction:column;gap:12px;margin-top:4px;}
.breakdown-row{display:flex;flex-direction:column;gap:6px;}
.breakdown-meta{display:flex;justify-content:space-between;align-items:center;}
.breakdown-label{
  font-size:12px;font-weight:600;color:var(--t1);
  display:flex;align-items:center;gap:8px;
}
.cat-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.breakdown-count{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--t2);
}
.breakdown-bar-bg{
  height:6px;background:var(--bg3);border-radius:10px;overflow:hidden;
}
.breakdown-bar-fill{
  height:100%;border-radius:10px;
  transition:width .7s cubic-bezier(.4,0,.2,1);
}

/* ── ACTIVITY FEED ───────────────────────────────────────────── */
.feed-list{display:flex;flex-direction:column;gap:8px;}
.feed-item{
  background:var(--bg2);border:1px solid var(--b);
  border-radius:var(--r);padding:14px 16px;
  display:grid;grid-template-columns:auto 1fr auto;
  align-items:start;gap:12px;
  transition:border-color .2s;
}
.feed-item:hover{border-color:var(--b2);}
.feed-type{
  padding:3px 8px;border-radius:6px;
  font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  white-space:nowrap;
  flex-shrink:0;
}
.type-ia{background:rgba(59,130,246,.18);color:var(--cat-ia);}
.type-skill{background:rgba(216,180,254,.15);color:var(--cat-skill);}
.type-cliente{background:rgba(52,211,153,.15);color:var(--cat-cliente);}
.type-proyecto{background:rgba(249,115,22,.15);color:var(--cat-proyecto);}
.type-admin{background:rgba(148,163,184,.12);color:var(--cat-admin);}
.feed-desc{font-size:13px;color:var(--t1);font-weight:500;line-height:1.4;}
.feed-proj{font-size:11px;color:var(--t3);margin-top:2px;}
.feed-meta{
  display:flex;flex-direction:column;align-items:flex-end;gap:2px;
  flex-shrink:0;
}
.feed-hrs{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;font-weight:600;color:var(--t1);
}
.feed-date{font-size:10px;color:var(--t3);}

/* ── EMPTY STATE ─────────────────────────────────────────────── */
.empty-state{
  text-align:center;padding:48px 24px;
  color:var(--t3);
}
.empty-state svg{opacity:.3;margin-bottom:16px;}
.empty-state p{font-size:14px;}

/* ── FLOAT CTA ───────────────────────────────────────────────── */
.float-cta{
  position:fixed;bottom:32px;right:32px;z-index:200;
  display:flex;align-items:center;gap:10px;
  background:var(--accent);
  color:#fff;font-size:13px;font-weight:700;
  padding:14px 22px;border-radius:50px;
  border:none;cursor:pointer;
  box-shadow:0 8px 32px rgba(59,130,246,.45);
  transition:transform .2s,box-shadow .2s,opacity .2s;
}
.float-cta:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(59,130,246,.55);}
.float-cta svg{flex-shrink:0;}

/* ── MODAL ───────────────────────────────────────────────────── */
.modal-backdrop{
  position:fixed;inset:0;z-index:300;
  background:rgba(6,6,9,.8);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--bg2);border:1px solid var(--b2);
  border-radius:var(--r2);padding:28px;
  width:100%;max-width:480px;
  transform:translateY(20px);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.modal-backdrop.open .modal{transform:translateY(0);}
.modal-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:24px;
}
.modal-title{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:18px;font-weight:800;letter-spacing:-.5px;
}
.modal-close{
  background:var(--bg3);border:1px solid var(--b);
  color:var(--t2);width:32px;height:32px;border-radius:8px;
  cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,color .2s;
}
.modal-close:hover{background:var(--bg1);color:var(--t1);}

/* ── FORM ────────────────────────────────────────────────────── */
.form-group{margin-bottom:16px;}
.form-label{
  display:block;font-size:11px;font-weight:600;
  letter-spacing:.7px;text-transform:uppercase;
  color:var(--t3);margin-bottom:8px;
}
.form-input, .form-select{
  width:100%;
  background:var(--bg3);border:1px solid var(--b);
  color:var(--t1);font-size:14px;font-family:'Inter',sans-serif;
  padding:10px 14px;border-radius:10px;
  outline:none;transition:border-color .2s,box-shadow .2s;
  appearance:none;
}
.form-input::placeholder{color:var(--t3);}
.form-input:focus,.form-select:focus{
  border-color:rgba(59,130,246,.5);
  box-shadow:0 0 0 3px rgba(59,130,246,.1);
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){.form-row{grid-template-columns:1fr;}}

.btn-save{
  width:100%;background:var(--accent);color:#fff;
  font-size:14px;font-weight:700;letter-spacing:.3px;
  padding:12px;border-radius:12px;border:none;cursor:pointer;
  margin-top:8px;
  transition:opacity .2s,transform .2s;
}
.btn-save:hover{opacity:.88;transform:translateY(-1px);}

/* ── SCROLLBAR ───────────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--b2);}

/* ── RESPONSIVE TWEAKS ───────────────────────────────────────── */
@media(max-width:600px){
  nav{padding:0 16px;gap:16px;}
  .nav-links a{padding:5px 8px;font-size:12px;}
  main{padding:20px 16px 100px;}
  .page-header h1{font-size:22px;}
  .kpi-number{font-size:28px;}
  .float-cta{bottom:20px;right:20px;padding:12px 18px;font-size:12px;}
}
</style>
<script defer src="https://victor-ia-brain-tracker.vercel.app/vi-track.js" data-site="victor-ia-home"></script>

</head>
<body>

<!-- ── NAV ──────────────────────────────────────────────────── -->
<nav>
  <span class="nav-logo">Victor <span>IA</span></span>
  <div class="nav-links">
    <a href="/">Brain</a>
    <a href="/studio">Studio</a>
    <a href="/image-lab">Image Lab</a>
    <a href="/cms">CMS</a>
    <a href="#" class="active">Dashboard</a>
  </div>

    <a href="/crm" class="btn-crm">CRM</a>
  </div>
</nav>

<!-- ── MAIN ─────────────────────────────────────────────────── -->
<main>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div>
      <h1>Dashboard BI</h1>
      <p id="page-sub">Actividad · Rendimiento · Proyectos</p>
    </div>

</main>

<!-- ── FLOAT CTA ─────────────────────────────────────────────── -->
<button class="float-cta" id="btn-open-modal" aria-label="Registrar actividad">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

</button>

<!-- ── MODAL ─────────────────────────────────────────────────── -->
<div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Nueva actividad</span>

        <label class="form-label" for="f-desc">Descripción</label>
        <input class="form-input" id="f-desc" type="text" placeholder="¿Qué hiciste?" required>
      </div>

          <input class="form-input" id="f-hrs" type="number" step="0.25" min="0.25" max="24" placeholder="0.5" required>

          <label class="form-label" for="f-fecha">Fecha</label>

      </div>
      <button class="btn-save" type="submit">Guardar actividad</button>
    </form>
  </div>
</div>

<script>
/* ─────────────────────────────────────────────────────────────
   DEMO DATA — se usa si localStorage está vacío
───────────────────────────────────────────────────────────── */
const DEMO = (() => {
  const tipos = ['ia','skill','cliente','proyecto','admin'];
  const descs = {
    ia:['Prompt engineering nuevo agente','Fine-tune con OpenRouter','Test Claude API batch','Configurar memoria sesiones','Optimizar contexto sistema'],
    skill:['Skill HyperFrames v2','Skill web-4o cirugía visual','Skill SVG Motion','Skill brain-tracker-ux','Skill inclusivo WCAG'],
    cliente:['Propuesta Seabird Hotel','Call Costa Negra QR','Revisión ROES & CO website','Follow-up Aldo Rendón','Briefing Rosa Laura Ubeda'],
    proyecto:['Deploy Victor IA website','Build dashboard BI','Influence IA Awards page','Brandbook sección motion','Costa Negra landing v3'],
    admin:['Actualizar finanzas','Revisar licencias','Log sesión en diario','Punto de parada checkpoint','Actualizar MEMORY.md'],
  };
  const proyectos = ['Victor IA','Costa Negra','Seabird Hotel','ROES & CO','Influence IA','LATIVA','Internal'];
  const acts = [];
  const now = new Date();
  for(let d=0;d<21;d++){
    const day = new Date(now);
    day.setDate(day.getDate()-d);
    const count = Math.floor(Math.random()*5)+1;
    for(let i=0;i<count;i++){
      const tipo = tipos[Math.floor(Math.random()*tipos.length)];
      const desc = descs[tipo][Math.floor(Math.random()*descs[tipo].length)];
      const hrs = +(Math.random()*3+0.5).toFixed(2);
      const proj = proyectos[Math.floor(Math.random()*proyectos.length)];
      const ts = day.toISOString();
      const dateKey = day.toISOString().slice(0,10);
      acts.push({tipo,desc,hrs,proj,ts,date:dateKey,dateKey});
    }
  }
  return acts;
})();

/* ─────────────────────────────────────────────────────────────
   STORAGE
───────────────────────────────────────────────────────────── */
function loadActivities(){
  try{
    const raw = localStorage.getItem('vib-actividades');
    const arr = raw ? JSON.parse(raw) : [];
    return arr.length ? arr : DEMO;
  }catch(e){return DEMO;}
}
function saveActivities(arr){
  try{localStorage.setItem('vib-actividades',JSON.stringify(arr));}catch(e){}
}
function isDemo(arr){
  const raw = localStorage.getItem('vib-actividades');
  try{const stored = raw ? JSON.parse(raw) : [];return stored.length===0;}catch(e){return true;}
}

/* ─────────────────────────────────────────────────────────────
   DATE HELPERS
───────────────────────────────────────────────────────────── */
function todayKey(){return new Date().toISOString().slice(0,10);}
function weekKeys(){
  const keys=[];const d=new Date();
  for(let i=0;i<7;i++){
    keys.push(new Date(d.getFullYear(),d.getMonth(),d.getDate()-i).toISOString().slice(0,10));
  }
  return keys;
}
function monthKeys(){
  const keys=[];const d=new Date();
  for(let i=0;i<31;i++){
    keys.push(new Date(d.getFullYear(),d.getMonth(),d.getDate()-i).toISOString().slice(0,10));
  }
  return keys;
}
function filterByPeriod(acts,period){
  if(period==='todo') return acts;
  if(period==='hoy'){const t=todayKey();return acts.filter(a=>a.dateKey===t);}
  if(period==='semana'){const ks=weekKeys();return acts.filter(a=>ks.includes(a.dateKey));}
  if(period==='mes'){const ks=monthKeys();return acts.filter(a=>ks.includes(a.dateKey));}
  return acts;
}

/* ─────────────────────────────────────────────────────────────
   KPI CALCULATION
───────────────────────────────────────────────────────────── */
function calcKPIs(allActs, filteredActs){
  const t = todayKey();
  const todayActs = allActs.filter(a=>a.dateKey===t);
  const weekActs = allActs.filter(a=>weekKeys().includes(a.dateKey));
  const hrsHoy = todayActs.reduce((s,a)=>s+Number(a.hrs||0),0);
  const actsSemana = weekActs.length;
  const hrsTotal = allActs.reduce((s,a)=>s+Number(a.hrs||0),0);
  const revenueHora = hrsTotal>0 ? Math.round(50000/hrsTotal) : 0;
  // retrabajo: actividades con tipo 'retrabajo' o desc que contiene 'rehacer'/'correc'
  const retrabajo = allActs.filter(a=>
    (a.tipo&&a.tipo.toLowerCase().includes('retrabajo'))||
    (a.desc&&(a.desc.toLowerCase().includes('rehacer')||a.desc.toLowerCase().includes('correc')||a.desc.toLowerCase().includes('fix')))
  ).length;
  const retrabajoP = allActs.length>0 ? Math.round((retrabajo/allActs.length)*100) : 0;
  return {hrsHoy,actsSemana,hrsTotal,revenueHora,retrabajoP};
}

/* ─────────────────────────────────────────────────────────────
   RENDER KPIs
───────────────────────────────────────────────────────────── */
function renderKPIs(allActs,filtered){
  const k = calcKPIs(allActs,filtered);
  const grid = document.getElementById('kpi-grid');
  const cards = [
    {label:'Horas hoy',num:k.hrsHoy.toFixed(1),unit:'h',sub:'Actividad del día',cls:''},
    {label:'Actos esta semana',num:k.actsSemana,unit:'',sub:'Últimos 7 días',cls:'purple'},
    {label:'Horas totales',num:k.hrsTotal.toFixed(0),unit:'h',sub:'Histórico completo',cls:'green'},
    {label:'Revenue / hora',num:k.hrsTotal>0?'$'+k.revenueHora.toLocaleString():'—',unit:'',sub:'$50k MXN ÷ total hrs',cls:'gold'},
    {label:'Retrabajo',num:k.retrabajoP,unit:'%',sub:'Del total de actividades',cls:'orange'},
  ];
  grid.innerHTML = cards.map(c=>`
    <div class="kpi-card ${c.cls}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-number">${c.num}<span class="kpi-unit">${c.unit}</span></div>
      <div class="kpi-sub">${c.sub}</div>
    </div>
  `).join('');
}

/* ─────────────────────────────────────────────────────────────
   RENDER BAR CHART (últimos 14 días)
───────────────────────────────────────────────────────────── */
function renderBarChart(allActs){
  const days=[];const d=new Date();
  for(let i=13;i>=0;i--){
    const dd=new Date(d.getFullYear(),d.getMonth(),d.getDate()-i);
    days.push({
      key:dd.toISOString().slice(0,10),
      label:dd.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit'}).replace('/','/'),
      short:dd.toLocaleDateString('es-MX',{day:'2-digit',month:'short'}).replace('. ',''),
    });
  }
  const counts=days.map(dd=>allActs.filter(a=>a.dateKey===dd.key).length);
  const max=Math.max(...counts,1);
  const todK=todayKey();
  const container=document.getElementById('bar-chart');
  container.innerHTML=days.map((dd,i)=>{
    const pct=Math.round((counts[i]/max)*100);
    const isToday=dd.key===todK;
    return `
      <div class="bar-col" title="${dd.key}: ${counts[i]} actividades">
        <div class="bar-wrap" style="height:100%;width:100%;flex:1;position:relative;">
          <div class="bar-fill ${isToday?'today':''}" style="height:${pct}%;"></div>
          ${counts[i]>0?`<span class="bar-val">${counts[i]}</span>`:''}
        </div>
        <div class="bar-date">${dd.short}</div>
      </div>
    `;
  }).join('');
}

/* ─────────────────────────────────────────────────────────────
   RENDER BREAKDOWN
───────────────────────────────────────────────────────────── */
const CAT_CONFIG = {
  ia:     {label:'IA',color:'var(--cat-ia)'},
  skill:  {label:'Skill',color:'var(--cat-skill)'},
  cliente:{label:'Cliente',color:'var(--cat-cliente)'},
  proyecto:{label:'Proyecto',color:'var(--cat-proyecto)'},
  admin:  {label:'Admin',color:'var(--cat-admin)'},
};
function renderBreakdown(filtered){
  const totals={ia:0,skill:0,cliente:0,proyecto:0,admin:0};
  filtered.forEach(a=>{const t=(a.tipo||'admin').toLowerCase();if(totals[t]!==undefined)totals[t]++;});
  const max=Math.max(...Object.values(totals),1);
  const list=document.getElementById('breakdown-list');
  list.innerHTML=Object.entries(totals)
    .sort((a,b)=>b[1]-a[1])
    .map(([tipo,count])=>{
      const cfg=CAT_CONFIG[tipo]||{label:tipo,color:'var(--t3)'};
      const pct=Math.round((count/max)*100);
      return `
        <div class="breakdown-row">
          <div class="breakdown-meta">
            <span class="breakdown-label">
              <span class="cat-dot" style="background:${cfg.color};"></span>
              ${cfg.label}
            </span>
            <span class="breakdown-count">${count} actos</span>
          </div>
          <div class="breakdown-bar-bg">
            <div class="breakdown-bar-fill" style="width:${pct}%;background:${cfg.color};opacity:.8;"></div>
          </div>
        </div>
      `;
    }).join('');
}

/* ─────────────────────────────────────────────────────────────
   RENDER FEED
───────────────────────────────────────────────────────────── */
function renderFeed(filtered){
  const container=document.getElementById('feed-list');
  const sorted=[...filtered].sort((a,b)=>new Date(b.ts)-new Date(a.ts)).slice(0,20);
  if(!sorted.length){
    container.innerHTML=`<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <p>No hay actividades en este período.</p>
    </div>`;
    return;
  }
  container.innerHTML=`<div class="feed-list">${sorted.map(a=>{
    const tipo=(a.tipo||'admin').toLowerCase();
    const cfg=CAT_CONFIG[tipo]||{label:tipo};
    const date=new Date(a.ts);
    const dateStr=date.toLocaleDateString('es-MX',{day:'2-digit',month:'short'});
    return `
      <div class="feed-item">
        <span class="feed-type type-${tipo}">${cfg.label}</span>
        <div>
          <div class="feed-desc">${escHtml(a.desc||'—')}</div>
          ${a.proj?`<div class="feed-proj">${escHtml(a.proj)}</div>`:''}
        </div>
        <div class="feed-meta">
          <span class="feed-hrs">${Number(a.hrs||0).toFixed(1)}h</span>
          <span class="feed-date">${dateStr}</span>
        </div>
      </div>
    `;
  }).join('')}</div>`;
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─────────────────────────────────────────────────────────────
   FULL RENDER
───────────────────────────────────────────────────────────── */
let currentFilter='hoy';
function renderAll(){
  const all=loadActivities();
  const filtered=filterByPeriod(all,currentFilter);
  const demoMode=isDemo(all);
  document.getElementById('page-sub').textContent=
    demoMode ? 'Actividad · Rendimiento · Proyectos — (datos demo)' :
    'Actividad · Rendimiento · Proyectos';
  renderKPIs(all,filtered);
  renderBarChart(all);
  renderBreakdown(filtered);
  renderFeed(filtered);
}

/* ─────────────────────────────────────────────────────────────
   FILTERS
───────────────────────────────────────────────────────────── */
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter=btn.dataset.f;
    renderAll();
  });
});

/* ─────────────────────────────────────────────────────────────
   MODAL
───────────────────────────────────────────────────────────── */
const backdrop=document.getElementById('modal-backdrop');
const openBtn=document.getElementById('btn-open-modal');
const closeBtn=document.getElementById('btn-close-modal');

openBtn.addEventListener('click',()=>{
  backdrop.classList.add('open');
  document.getElementById('f-fecha').value=todayKey();
  document.getElementById('f-tipo').focus();
});
closeBtn.addEventListener('click',()=>backdrop.classList.remove('open'));
backdrop.addEventListener('click',e=>{if(e.target===backdrop)backdrop.classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')backdrop.classList.remove('open');});

document.getElementById('activity-form').addEventListener('submit',e=>{
  e.preventDefault();
  const tipo=document.getElementById('f-tipo').value;
  const desc=document.getElementById('f-desc').value.trim();
  const hrs=parseFloat(document.getElementById('f-hrs').value);
  const proj=document.getElementById('f-proj').value.trim();
  const fecha=document.getElementById('f-fecha').value;
  if(!tipo||!desc||!hrs||!fecha) return;

  let stored=[];
  try{const raw=localStorage.getItem('vib-actividades');stored=raw?JSON.parse(raw):[];}catch(e){}

  const ts=new Date(fecha+'T12:00:00').toISOString();
  stored.push({tipo,desc,hrs,proj:proj||undefined,ts,date:fecha,dateKey:fecha});
  saveActivities(stored);

  // reset form
  e.target.reset();
  backdrop.classList.remove('open');
  renderAll();
});

/* ─────────────────────────────────────────────────────────────
   INIT
───────────────────────────────────────────────────────────── */
renderAll();
</script>
